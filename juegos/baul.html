<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Gym - Baúl de Errores</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --bg: #1a1917; --panel: #262421; --accent: #e5bf00; --blue: #3692e7; --green: #629924; --red: #cc3333; --text: #bababa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #000; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 100; }
        #brand-logo { margin: 0; font-size: 1.8em; color: var(--accent); letter-spacing: 1px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); text-decoration: none; }
        #nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-link { color: var(--green); text-decoration: none; font-weight: bold; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; padding: 5px 10px; border-radius: 5px; white-space: nowrap;}
        .nav-link:hover { color: #fff; background: rgba(98, 153, 36, 0.2); transform: scale(1.05); }

        #main-content { margin-top: 100px; padding: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; width: 100%; box-sizing: border-box;}
        
        .grid-errores { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .error-card { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border-top: 4px solid var(--red); display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s, border-color 0.2s; }
        .error-card:hover { transform: translateY(-5px); border-color: #555; box-shadow: 0 12px 25px rgba(0,0,0,0.6); }

        .error-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .error-modulo { color: var(--accent); font-weight: bold; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
        .error-fecha { color: #777; font-size: 0.85em; }

        .error-body { display: flex; flex-direction: column; gap: 8px; background: #1a1917; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .jugada-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.1em; }
        .jugada-row.fail .jugada-value { color: var(--red); font-weight: bold; font-size: 1.2em;}
        .jugada-row.success .jugada-value { color: var(--green); font-weight: bold; font-size: 1.2em;}

        .fen-container { display: flex; flex-direction: column; gap: 5px; }
        .fen-title { font-size: 0.8em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .fen-box { background: #0a0a0a; color: #888; padding: 10px 12px; font-family: 'Consolas', monospace; border-radius: 6px; font-size: 0.85em; word-break: break-all; border: 1px dashed #333; }
        
        .error-actions { display: flex; gap: 10px; margin-top: auto; }
        .btn-accion { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        .btn-analizar { background: var(--blue); box-shadow: 0 4px 0 #20629c; flex-grow: 1; font-size: 1em; }
        .btn-analizar:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 6px 0 #20629c; }
        .btn-analizar:active { transform: translateY(2px); box-shadow: 0 2px 0 #20629c; }

        .btn-borrar { background: #3d3a37; box-shadow: 0 4px 0 #1a1917; width: 55px; font-size: 1.3em; }
        .btn-borrar:hover { background: var(--red); box-shadow: 0 4px 0 #8a1f1f; transform: translateY(-2px); }
        .btn-borrar:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a1f1f; }
    </style>
</head>
<body>
    <div id="top-bar">
        <a href="index.html" id="brand-logo">♞ CHESS GYM</a>
        <div id="nav-menu">
            <a href="index.html" class="nav-link">VOLVER AL CUARTEL</a>
        </div>
        <div style="width: 150px;"></div>
    </div>

    <div id="main-content">
        <h1 style="color: #fff; margin-bottom: 5px; font-size: 2.5em; text-align: center;">📦 Baúl de Errores</h1>
        <p style="color: #aaa; text-align: center; font-size: 1.2em;">Analiza los puzzles que has fallado y bórralos cuando los domines.</p>
        
        <div id="lista-errores" class="grid-errores">
            <div style="color: #888; text-align: center; grid-column: 1 / -1; font-size: 1.2em; margin-top: 50px;">
                Cargando tu historial de errores...
            </div>
        </div>
    </div>

<script src="utils.js?v=2"></script>
    <script>
        window.onload = () => {
            if (typeof firebase === 'undefined') return;
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    cargarErrores(user.uid);
                } else {
                    window.location.href = 'index.html';
                }
            });
        };

        function cargarErrores(uid) {
            firebase.database().ref('users/' + uid + '/errores').on('value', snap => {
                let contenedor = document.getElementById('lista-errores');
                if (!snap.exists()) {
                    contenedor.innerHTML = '<div style="color: var(--green); text-align: center; grid-column: 1 / -1; font-size: 1.5em; margin-top: 50px; background: #262421; padding: 40px; border-radius: 12px; border: 1px dashed var(--green);">🎉 ¡Felicidades! No tienes errores pendientes de repasar.</div>';
                    return;
                }

                let html = '';
                let errores = [];
                snap.forEach(child => { errores.push({ key: child.key, ...child.val() }); });

                errores.sort((a, b) => b.timestamp - a.timestamp);

                errores.forEach(e => {
                    html += `
                        <div class="error-card">
                            <div class="error-header">
                                <span class="error-modulo">⚡ ${e.modulo}</span>
                                <span class="error-fecha">${e.fecha}</span>
                            </div>
                            
                            <div class="error-body">
                                <div class="jugada-row fail">
                                    <span>❌ Tu jugada:</span>
                                    <span class="jugada-value">${e.tuJugada}</span>
                                </div>
                                <div class="jugada-row success">
                                    <span>✅ Solución:</span>
                                    <span class="jugada-value">${e.solucion}</span>
                                </div>
                            </div>

                            <div class="fen-container">
                                <span class="fen-title">Posición (FEN)</span>
                                <div class="fen-box">${e.fen}</div>
                            </div>

                            <div class="error-actions">
                                <button class="btn-accion btn-analizar" onclick="analizar('${e.fen}', '${e.solucion}')">🔍 Analizar en Tablero</button>
                                <button class="btn-accion btn-borrar" onclick="borrarFallo('${e.key}')" title="Eliminar este fallo">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                contenedor.innerHTML = html;
            });
        }

        function analizar(fen, solucion) {
            // Enviamos el FEN y la Solución en la URL
            window.location.href = 'analisis.html?fen=' + encodeURIComponent(fen) + '&solucion=' + encodeURIComponent(solucion);
        }
    </script>
</body>
</html>
