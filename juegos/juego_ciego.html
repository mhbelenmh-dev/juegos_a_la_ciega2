<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Puzzle Storm: A la Ciega - Modo Torneo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        h1 { color: var(--accent); margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        #main-layout { display: flex; flex-direction: row; gap: 30px; width: 100%; max-width: 1200px; justify-content: center; align-items: flex-start; }
        @media (max-width: 950px) { #main-layout { flex-direction: column; align-items: center; } .sidebar-panel { width: 100%; max-width: 450px; } #tablero-wrapper { width: 100%; max-width: 450px; } }

        #tablero-wrapper { flex: 0 0 450px; display: flex; flex-direction: column; gap: 15px; }

        #descripcion-posicion { background: #1a1917; padding: 25px; border-radius: 8px; width: 100%; box-sizing: border-box; text-align: left; font-family: 'Consolas', monospace; font-size: 1.1em; line-height: 1.6; border: 1px solid #444; border-left: 5px solid var(--blue); box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
        .bando-titulo { font-weight: bold; color: var(--blue); margin-bottom: 5px; display: block; text-transform: uppercase;}
        .bando-titulo.negras { color: var(--danger); margin-top: 15px; }
        .lista-piezas { color: #eee; word-wrap: break-word; }

        #tablero-container { width: 100%; max-width: 450px; border: 6px solid #3d3a37; border-radius: 4px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #tablero { width: 100%; touch-action: none !important; }

        #input-container { display: flex; gap: 10px; width: 100%; }
        #jugadaInput { flex-grow: 1; padding: 15px; font-size: 1.2em; border-radius: 6px; border: 2px solid #555; background: #1e1e1e; color: white; text-align: center; outline: none; transition: 0.3s; }
        #jugadaInput:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(229, 191, 0, 0.2); }
        #btn-enviar { background: var(--blue); padding: 0 25px; box-shadow: 0 4px 0 #20629c; margin: 0; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer;}
        #btn-enviar:hover { background: #4fa3f0; transform: translateY(-2px); }

        #status { font-weight: bold; font-size: 1.2em; min-height: 30px; white-space: pre-wrap; text-align: center; margin-top: 10px;}

        .sidebar-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .panel-box { background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #444; height: 100%;}
        .panel-title { font-weight: bold; color: var(--accent); margin-bottom: 15px; font-size: 1.2em; text-transform: uppercase; text-align: center;}

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #262421; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #3d3a37; }
        .stat-value { display: block; font-size: 2em; color: var(--text); font-weight: bold; }
        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; margin-top: 5px; display: block;}

        .val-rating { color: var(--blue); } .val-racha { color: var(--accent); }

        #ultimo-movimiento { background: #4a4643; color: var(--accent); padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #666; margin-bottom: 15px;}

        button { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; box-sizing: border-box; }
        .btn-cargar { background: var(--blue); color: white; padding: 15px; font-size: 1.2em; box-shadow: 0 4px 0 #20629c;}
        .btn-skip { background: var(--danger); box-shadow: 0 4px 0 #8a1f1f; padding: 15px; color: white; font-size: 1.1em;}
        .btn-verde { background: var(--success); box-shadow: 0 4px 0 #4a751b; padding: 15px; color: white; font-size: 1.1em;}
        
        /* --- ESTILOS MODO TORNEO --- */
        #pantalla-carga { background: var(--panel-bg); padding: 40px; border-radius: 10px; max-width: 500px; width: 100%; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #lobby-torneo { background: var(--panel-bg); padding: 40px; border-radius: 12px; border: 2px solid var(--accent); max-width: 600px; width: 100%; margin: 0 auto; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        #codigo-input { background: #111; color: var(--accent); border: 2px dashed #555; font-size: 3em; font-family: 'Courier New', monospace; text-align: center; width: 200px; padding: 10px; border-radius: 8px; outline: none; margin: 10px 0 20px 0; font-weight: bold;}
        .jugador-lobby { display: inline-block; background: #262421; border: 1px solid #444; padding: 8px 15px; margin: 5px; border-radius: 20px; font-weight: bold; color: #fff; }
        .btn-gran-fuego { background: var(--success); color: white; font-size: 1.8em; padding: 20px; width: 100%; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 6px 0 #4a751b; margin-top: 20px; text-transform: uppercase;}

        .leaderboard-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #333; font-size: 1.1em; background: #222; margin-bottom: 5px; border-radius: 5px;}
        .leaderboard-item.me { border: 1px solid var(--accent); background: #2a2820; }
        .rank-pts { font-weight: bold; color: var(--blue); }
        #timer-torneo { font-size: 3em; font-family: 'Courier New', monospace; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 15px; background: #111; padding: 10px; border-radius: 8px; border: 2px solid #333; }

        #pantalla-podio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 20, 0.98); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .podio-titulo { font-size: 4em; color: var(--accent); text-transform: uppercase; margin-bottom: 40px; text-shadow: 0 0 20px rgba(229, 191, 0, 0.5); }
        .podio-fila { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; background: #222; padding: 20px; margin-bottom: 10px; border-radius: 8px; font-size: 1.5em; border: 1px solid #444; }
        .podio-oro { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); font-size: 1.8em; font-weight: bold;}
        .podio-plata { border-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .podio-bronce { border-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }
    </style>
</head>
<body>

    <h1 id="title-main">👁️ Ajedrez a la Ciega 👁️</h1>

    <div id="pantalla-carga">
        <h2 style="color: var(--text); margin-top: 0;">Modo de Juego</h2>
        <button class="btn-cargar" onclick="iniciarModoSolitario()">🎮 JUGAR EN SOLITARIO</button>
        <hr style="border: 1px solid #444; margin: 25px 0;">
        <button id="btn-torneo" class="btn-cargar" style="background: var(--accent); color: #000; box-shadow: 0 4px 0 #b39500;" onclick="abrirLobbyTorneo()">🏆 CREAR / UNIRSE A TORNEO</button>
        <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 15px; text-align: left;">
            <p style="font-size: 0.8em; color: #666; margin-bottom: 5px;">Avanzado: Subir archivo .json</p>
            <input type="file" id="archivoInput" accept=".json">
        </div>
        <a href="index.html" style="text-decoration:none;"><button class="btn-skip" style="background:#444; box-shadow: 0 4px 0 #222; margin-top: 20px;">⬅ Volver al Menú</button></a>
    </div>
    
    <div id="lobby-torneo" class="oculto">
        <h2 style="color: var(--accent); font-size: 2.5em; margin-top: 0;">SALA DE TORNEO</h2>
        <p style="color: #aaa; font-size: 1.1em;">Comparte este código o escribe uno para unirte:</p>
        <input type="text" id="codigo-input" maxlength="4" oninput="cambiarSalaTorneo(this.value)">
        <div style="background: #111; border: 1px solid #333; border-radius: 8px; padding: 20px; min-height: 150px; text-align: left;">
            <div style="color: #888; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">JUGADORES EN SALA:</div>
            <div id="lista-lobby">Cargando...</div>
        </div>
        <button class="btn-gran-fuego" onclick="empezarTorneoParaTodos()">🔥 ¡EMPEZAR AHORA! 🔥</button>
        <button class="btn-skip" style="background:#444; box-shadow: 0 4px 0 #222; margin-top:20px;" onclick="location.reload()">⬅ Salir del Lobby</button>
    </div>

    <div id="interfaz-juego" class="oculto">
        <div id="main-layout">
            <div class="sidebar-panel" id="panel-leaderboard" style="display: none;">
                <div class="panel-box">
                    <div class="panel-title">🏆 CLASIFICACIÓN</div>
                    <div id="leaderboard-list"></div>
                </div>
            </div>

            <div id="tablero-wrapper">
                <div id="timer-torneo" class="oculto">03:00</div>
                <div id="descripcion-posicion">
                    <span class="bando-titulo">Blancas:</span> <span id="txt-blancas" class="lista-piezas">...</span>
                    <span class="bando-titulo negras">Negras:</span> <span id="txt-negras" class="lista-piezas">...</span>
                    <div style="margin-top: 15px; font-style: italic; color: #888; font-size: 0.9em;">
                        * Juegan <span id="turno-texto" style="color: #fff; font-weight: bold; text-transform: uppercase;">...</span>
                    </div>
                </div>
                <div id="tablero-container" class="oculto"><div id="tablero"></div></div>
                <div id="input-container">
                    <input type="text" id="jugadaInput" placeholder="Ej: Ce5, h4..." autocomplete="off">
                    <button id="btn-enviar" onclick="verificarJugada()">Enviar</button>
                </div>
                <div id="status"></div>
            </div>

            <div class="sidebar-panel">
                <div class="panel-box" style="height: auto;">
                    <div class="panel-title" id="titulo-stats">Estadísticas</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span id="eloDisplay" class="stat-value val-rating">1700</span>
                            <span class="stat-label" id="label-elo">Nivel</span>
                        </div>
                        <div class="stat-card">
                            <span id="score" class="stat-value val-racha">0</span>
                            <span class="stat-label" id="label-pts">Aciertos</span>
                        </div>
                    </div>
                </div>
                <div class="panel-box" style="height: auto;">
                    <div id="ultimo-movimiento" class="oculto"></div>
                    <button id="btn-rendirse" class="btn-skip" onclick="rendirse()">🏳️ Ver Solución (-5 pts)</button>
                    <button id="btn-siguiente" class="btn-verde oculto" onclick="cargarNuevoPuzzle()">Siguiente Puzzle ➡</button>
                    <a id="btn-volver" href="index.html" style="text-decoration:none;"><button class="btn-skip" style="background:#444; box-shadow: 0 4px 0 #222; margin-top:15px;">⬅ Abandonar</button></a>
                </div>
            </div>
        </div>
    </div>

    <div id="pantalla-podio" class="oculto">
        <div class="podio-titulo" id="podio-txt-titulo">🏁 TORNEO FINALIZADO 🏁</div>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <div style="display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; width: 100%;">
            <button id="btn-revancha-podio" class="btn-gran-fuego" style="width: auto; min-width: 250px; margin-top:0;" onclick="jugarRevancha()">🔄 Jugar Revancha</button>
            <button class="btn-gran-fuego" style="background: #444; box-shadow: 0 6px 0 #222; width: auto; min-width: 250px; margin-top:0;" onclick="location.reload()">⬅ Salir</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="utils.js"></script>

    <script>
        let todosLosPuzzles = {}; let eloActual = 1700; let puzzleActual = null; let game = new Chess(); let board = null; 
        let aciertosTotal = 0; let puzzleResuelto = false; let indiceMovimiento = 0; let juegoActivo = false;
        
        let refSalaTorneo = null; let intervaloTorneo = null;

        inicializarCargaBaseDatos('mis_puzzles.json', null, 'archivoInput', function(data) { todosLosPuzzles = data; });

        document.getElementById("jugadaInput").addEventListener("keyup", function(event) { if (event.key === "Enter") verificarJugada(); });

        // ---------------- TORNEO LOBBY ----------------
        function abrirLobbyTorneo() {
            let btn = document.getElementById('btn-torneo');
            if (btn) btn.innerText = "Cargando Arena...";
            if (Object.keys(todosLosPuzzles).length > 0) { ejecutarLobby(); }
            else {
                fetch('mis_puzzles.json').then(r => r.json()).then(data => { todosLosPuzzles = data; ejecutarLobby(); })
                .catch(e => { alert("Error cargando base"); if (btn) btn.innerText = "🏆 CREAR / UNIRSE A TORNEO"; });
            }
        }

        function ejecutarLobby() {
            document.getElementById('pantalla-carga').classList.add('oculto');
            document.getElementById('lobby-torneo').classList.remove('oculto');
            document.getElementById('title-main').style.display = 'none';
            let codigoRandom = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('codigo-input').value = codigoRandom;
            cambiarSalaTorneo(codigoRandom);
        }

        function cambiarSalaTorneo(codigo) {
            codigo = codigo.trim(); if(codigo.length < 4) return;
            TorneoManager.enTorneo = true; TorneoManager.codigoSala = codigo;
            let uid = localStorage.getItem('current_user_uid') || "invitado_" + Math.floor(Math.random()*1000);
            let nombre = localStorage.getItem('current_user_name') || "Anónimo";

            if (refSalaTorneo) firebase.database().ref(refSalaTorneo).off(); 
            refSalaTorneo = `torneos/${codigo}`;
            
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}`).set({ nombre: nombre, puntos: 0 });
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}`).onDisconnect().remove();

            firebase.database().ref(refSalaTorneo).on('value', (snap) => {
                let data = snap.val(); if (!data) return;
                if (data.jugadores) {
                    let htmlLobby = ""; let listaLeaderboard = []; let miUid = localStorage.getItem('current_user_uid');
                    for (let key in data.jugadores) {
                        let j = data.jugadores[key]; htmlLobby += `<span class="jugador-lobby">${j.nombre}</span>`;
                        listaLeaderboard.push({ uid: key, nombre: j.nombre, puntos: j.puntos || 0 });
                    }
                    if (!juegoActivo) document.getElementById('lista-lobby').innerHTML = htmlLobby;
                    
                    listaLeaderboard.sort((a, b) => b.puntos - a.puntos);
                    let htmlBoard = "";
                    listaLeaderboard.forEach((j, index) => {
                        let medalla = index === 0 ? '👑' : index === 1 ? '🥈' : index === 2 ? '🥉' : '🔹';
                        let extraClass = (j.uid === miUid) ? "me" : "";
                        htmlBoard += `<div class="leaderboard-item ${extraClass}"><span>${medalla} ${j.nombre}</span> <span class="rank-pts">${j.puntos}</span></div>`;
                    });
                    document.getElementById('leaderboard-list').innerHTML = htmlBoard;
                }
                if (data.estado === 'jugando' && !juegoActivo) {
                    let restante = data.tiempoFin ? Math.floor((data.tiempoFin - Date.now()) / 1000) : 0;
                    if (restante > 0) {
                        TorneoManager.semillaRonda = data.tiempoFin.toString();
                        document.getElementById('pantalla-podio').classList.add('oculto');
                        empezarPartida(true, data.tiempoFin);
                    } else {
                        document.getElementById('lista-lobby').innerHTML += "<div style='color:var(--accent); margin-top:15px; font-style:italic;'>Partida terminada. Esperando revancha...</div>";
                    }
                }
            });
        }

        function empezarTorneoParaTodos() {
            if (!TorneoManager.codigoSala) return;
            let tiempoFinal = Date.now() + 180000; // 3 Minutos exactos
            firebase.database().ref(refSalaTorneo).update({ estado: 'jugando', tiempoFin: tiempoFinal });
        }

        // ---------------- JUEGO CIEGO ----------------
        function iniciarModoSolitario() {
            if (Object.keys(todosLosPuzzles).length === 0) {
                fetch('mis_puzzles.json').then(r => r.json()).then(data => { todosLosPuzzles = data; empezarPartida(false); }).catch(e => alert("Sube un archivo."));
            } else { empezarPartida(false); }
        }

        function empezarPartida(esTorneo, tiempoFinMs = null) {
            juegoActivo = true;
            document.getElementById('pantalla-carga').classList.add('oculto');
            document.getElementById('lobby-torneo').classList.add('oculto');
            document.getElementById('interfaz-juego').classList.remove('oculto');
            board = Chessboard('tablero', { pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
            
            aciertosTotal = 0;
            document.getElementById('score').innerText = aciertosTotal;

            if (esTorneo) {
                TorneoManager.contador = 0;
                document.getElementById('panel-leaderboard').style.display = 'block';
                document.getElementById('btn-volver').style.display = 'none';
                document.getElementById('timer-torneo').classList.remove('oculto');
                document.getElementById('label-elo').innerText = "Dificultad";
                document.getElementById('label-pts').innerText = "Puntos";
                
                intervaloTorneo = setInterval(() => {
                    let tiempoRestante = Math.floor((tiempoFinMs - Date.now()) / 1000);
                    if (tiempoRestante <= 0) { clearInterval(intervaloTorneo); finalizarTorneoGlobal(); return; }
                    let m = Math.floor(tiempoRestante / 60); let s = tiempoRestante % 60;
                    let timerEl = document.getElementById('timer-torneo');
                    timerEl.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                    if(tiempoRestante <= 10) timerEl.style.color = "var(--danger)";
                    else timerEl.style.color = "var(--accent)";
                }, 1000);
            } else {
                let p = obtenerPerfil(); eloActual = p.eloCiego || 1700; 
                document.getElementById('eloDisplay').innerText = eloActual;
            }
            
            cargarNuevoPuzzle(); 
        }

        function cargarNuevoPuzzle() {
            if (!juegoActivo) return;
            puzzleResuelto = false; indiceMovimiento = 0; 
            document.getElementById('status').innerText = ""; document.getElementById('status').className = "";
            document.getElementById('ultimo-movimiento').classList.add('oculto');
            document.getElementById('jugadaInput').value = ""; document.getElementById('jugadaInput').disabled = false; document.getElementById('jugadaInput').focus();
            document.getElementById('descripcion-posicion').classList.remove('oculto'); document.getElementById('tablero-container').classList.add('oculto'); 
            document.getElementById('btn-siguiente').classList.add('oculto'); document.getElementById('btn-rendirse').classList.remove('oculto'); document.getElementById('input-container').classList.remove('oculto');

            let rango = "1700"; let lista = [];
            if (TorneoManager.enTorneo) {
                eloActual = 1200 + Math.floor(TorneoManager.contador / 2) * 50;
                rango = (Math.floor(Math.min(eloActual, 2500) / 50) * 50).toString();
                if (!todosLosPuzzles[rango]) rango = Object.keys(todosLosPuzzles)[0] || "1700";
                lista = todosLosPuzzles[rango];
                let indice = TorneoManager.obtenerIndiceSincronizado(lista.length);
                puzzleActual = lista[indice];
            } else {
                rango = (Math.floor(Math.min(eloActual, 2500) / 50) * 50).toString();
                if (!todosLosPuzzles[rango]) rango = Object.keys(todosLosPuzzles)[0] || "1700";
                lista = todosLosPuzzles[rango]; 
                puzzleActual = lista[Math.floor(Math.random() * lista.length)];
            }

            if (typeof puzzleActual.moves === 'string') puzzleActual.moves = puzzleActual.moves.split(' ');
            document.getElementById('eloDisplay').innerText = eloActual;

            game.load(puzzleActual.fen); let moveRival = puzzleActual.moves[0]; hacerMovimiento(moveRival); indiceMovimiento++; 
            generarTextoPosicion(game.fen()); actualizarTurnoVisual();
        }

        function generarTextoPosicion(fen) {
            let partes = fen.split(' ')[0]; let filas = partes.split('/'); let blancas = []; let negras = []; const columnas = ['a','b','c','d','e','f','g','h'];
            for (let i = 0; i < 8; i++) {
                let filaNum = 8 - i; let colIndex = 0; let contenidoFila = filas[i];
                for (let j = 0; j < contenidoFila.length; j++) {
                    let char = contenidoFila[j];
                    if (!isNaN(char)) { colIndex += parseInt(char); } else {
                        let casilla = columnas[colIndex] + filaNum; let esBlanca = (char === char.toUpperCase());
                        let tipo = char.toLowerCase(); let nombrePieza = "";
                        switch(tipo) { case 'p': nombrePieza = "P"; break; case 'r': nombrePieza = "T"; break; case 'n': nombrePieza = "C"; break; case 'b': nombrePieza = "A"; break; case 'q': nombrePieza = "D"; break; case 'k': nombrePieza = "R"; break; }
                        let textoPieza = nombrePieza + casilla; 
                        if (esBlanca) blancas.push(textoPieza); else negras.push(textoPieza); colIndex++;
                    }
                }
            }
            blancas.sort(); negras.sort(); document.getElementById('txt-blancas').innerText = blancas.join(', '); document.getElementById('txt-negras').innerText = negras.join(', ');
        }

        function verificarJugada() {
            if (puzzleResuelto || !juegoActivo) return;
            let textoUsuario = document.getElementById('jugadaInput').value.trim(); if (!textoUsuario) return;
            let jugadaParaChessJS = textoUsuario.replace(/^R/, 'K').replace(/^D/, 'Q').replace(/^T/, 'R').replace(/^A/, 'B').replace(/^C/, 'N');
            let move = game.move(jugadaParaChessJS);
            if (move === null) { let intento2 = jugadaParaChessJS.charAt(0).toUpperCase() + jugadaParaChessJS.slice(1); move = game.move(intento2); }
            if (move === null) { reproducirSonido('incorrecto'); document.getElementById('status').innerText = "❌ Jugada ilegal o no entendida (Usa: Ce5, h4...)"; document.getElementById('status').className = "incorrecto"; return; }

            let movimientoHecho = move.from + move.to; if (move.promotion) movimientoHecho += move.promotion;
            let solucionCorrecta = puzzleActual.moves[indiceMovimiento];

            if (movimientoHecho === solucionCorrecta) {
                reproducirSonido('correcto');
                indiceMovimiento++; document.getElementById('jugadaInput').value = ""; 
                if (indiceMovimiento < puzzleActual.moves.length) {
                    let jugadaRival = puzzleActual.moves[indiceMovimiento]; let jugadaRivalSan = hacerMovimiento(jugadaRival); indiceMovimiento++;
                    let divUltimo = document.getElementById('ultimo-movimiento'); divUltimo.classList.remove('oculto'); 
                    divUltimo.innerHTML = `✅ ¡Bien! El rival responde:<br><strong style="font-size:1.4em; color:#fff;">${jugadaRivalSan}</strong><br>¿Qué haces?`;
                    generarTextoPosicion(game.fen());
                } else { 
                    if (TorneoManager.enTorneo) { aciertosTotal += 15; TorneoManager.enviarPuntos(aciertosTotal); } 
                    else { eloActual += 15; actualizarEstadisticaGlobal('eloCiego', eloActual, false); registrarXP('maestro', true); aciertosTotal++; }
                    mostrarResultado(true, "✅ ¡Puzzle Completado!"); 
                }
            } else {
                reproducirSonido('incorrecto');
                if (TorneoManager.enTorneo) { aciertosTotal = Math.max(0, aciertosTotal - 10); TorneoManager.enviarPuntos(aciertosTotal); } 
                else { eloActual -= 10; game.undo(); actualizarEstadisticaGlobal('eloCiego', eloActual, false); registrarXP('maestro', false); }
                let solucionTexto = generarSolucionCompleta();
                mostrarResultado(false, `❌ Fallaste. Tú dijiste ${textoUsuario}.\n\nSolución correcta:\n${solucionTexto}`);
            }
        }

        function generarSolucionCompleta() {
            let tempGame = new Chess(); tempGame.load(puzzleActual.fen); 
            let moveRival = puzzleActual.moves[0]; let from = moveRival.substring(0,2); let to = moveRival.substring(2,4); let promo = moveRival.length > 4 ? moveRival.substring(4,5) : 'q';
            tempGame.move({ from: from, to: to, promotion: promo }); let listaSolucion = [];
            for (let i = 1; i < puzzleActual.moves.length; i++) {
                let rawMove = puzzleActual.moves[i]; let f = rawMove.substring(0,2); let t = rawMove.substring(2,4); let p = rawMove.length > 4 ? rawMove.substring(4,5) : 'q';
                let moveObj = tempGame.move({ from: f, to: t, promotion: p });
                if (moveObj) { let numero = ""; if (tempGame.turn() === 'b') { let moveNumber = Math.ceil(tempGame.history().length / 2); numero = moveNumber + ". "; } listaSolucion.push(numero + moveObj.san); }
            } return listaSolucion.join(" ");
        }

        function hacerMovimiento(moveString) { let from = moveString.substring(0,2); let to = moveString.substring(2,4); let promotion = moveString.length > 4 ? moveString.substring(4,5) : 'q'; let move = game.move({ from: from, to: to, promotion: promotion }); return move ? move.san : moveString; }

        function rendirse() { 
            if(!juegoActivo) return;
            reproducirSonido('incorrecto');
            if (TorneoManager.enTorneo) { aciertosTotal = Math.max(0, aciertosTotal - 5); TorneoManager.enviarPuntos(aciertosTotal); } 
            else { eloActual -= 5; actualizarEstadisticaGlobal('eloCiego', eloActual, false); registrarXP('maestro', false); }
            let solucionTexto = generarSolucionCompleta(); 
            mostrarResultado(false, `Te has rendido.\nSolución completa:\n${solucionTexto}`); 
        }

        function mostrarResultado(esCorrecto, mensaje) {
            puzzleResuelto = true; document.getElementById('status').innerText = mensaje; document.getElementById('status').className = esCorrecto ? "correcto" : "incorrecto";
            document.getElementById('score').innerText = aciertosTotal; 
            document.getElementById('eloDisplay').innerText = eloActual;
            document.getElementById('descripcion-posicion').classList.add('oculto'); document.getElementById('tablero-container').classList.remove('oculto'); 
            board.position(game.fen()); board.orientation(game.turn() === 'w' ? 'white' : 'black'); setTimeout(function() { board.resize(); }, 50);
            document.getElementById('btn-rendirse').classList.add('oculto'); document.getElementById('btn-siguiente').classList.remove('oculto');
            document.getElementById('input-container').classList.add('oculto'); document.getElementById('ultimo-movimiento').classList.add('oculto');
            
            // Si es torneo y acierta, que cargue automático para que no pierda tiempo dando clics
            if (TorneoManager.enTorneo && esCorrecto) { setTimeout(cargarNuevoPuzzle, 1000); }
        }

        function actualizarTurnoVisual() { let turno = game.turn() === 'w' ? 'BLANCAS' : 'NEGRAS'; document.getElementById('turno-texto').innerText = turno; }

        // ---------------- PODIO Y REVANCHA ----------------
        function finalizarTorneoGlobal() {
            juegoActivo = false; reproducirSonido('fin');
            document.getElementById('interfaz-juego').classList.add('oculto');
            document.getElementById('pantalla-podio').classList.remove('oculto');
            firebase.database().ref(refSalaTorneo).update({ estado: 'finalizado' });

            firebase.database().ref(refSalaTorneo + '/jugadores').once('value').then(snap => {
                let data = snap.val(); if(!data) return;
                let lista = []; for(let key in data) { lista.push({ nombre: data[key].nombre, puntos: data[key].puntos || 0 }); }
                lista.sort((a, b) => b.puntos - a.puntos);
                let htmlPodio = "";
                lista.forEach((j, i) => {
                    let clase = i === 0 ? "podio-oro" : i === 1 ? "podio-plata" : i === 2 ? "podio-bronce" : "";
                    let icono = i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🏅";
                    htmlPodio += `<div class="podio-fila ${clase}"><span>${icono} ${j.nombre}</span> <strong>${j.puntos} pts</strong></div>`;
                });
                document.getElementById('lista-podio').innerHTML = htmlPodio;
            });
        }

        function jugarRevancha() {
            document.getElementById('pantalla-podio').classList.add('oculto'); document.getElementById('lobby-torneo').classList.remove('oculto');
            firebase.database().ref(refSalaTorneo).update({ estado: 'esperando', tiempoFin: null });
            let uid = localStorage.getItem('current_user_uid');
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}/puntos`).set(0);
            aciertosTotal = 0; juegoActivo = false;
        }
    </script>
