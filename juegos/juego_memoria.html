<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Memoria: Tablero Vacío</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #262421; color: #bababa; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { color: #e5bf00; margin: 0 0 20px 0; }
        #contenedor-juego { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
        #tablero-container { width: 450px; height: 450px; position: relative; border: 5px solid #404040; margin-bottom: 20px; }
        #tablero { width: 100%; height: 100%; }
        #cortina { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(38, 36, 33, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #barra-tiempo-container { width: 450px; height: 10px; background: #333; margin: 10px 0; border-radius: 5px; overflow: hidden; }
        #barra-tiempo { height: 100%; width: 100%; background: #629924; transition: width linear; }
        #zona-respuesta { width: 450px; background: #1e1e1e; padding: 15px; border-radius: 8px; display: none; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 80px; background: #302e2c; color: #fff; border: 1px solid #555; padding: 10px; font-size: 1.1em; resize: none; box-sizing: border-box; }
        button { border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2em; transition: 0.1s; }
        .btn-amarillo { background: #e5bf00; color: #262421; font-size: 1.5em; padding: 20px 40px; border: 2px solid #fff; }
        .btn-amarillo:hover { background: #ffe03d; transform: scale(1.05); }
        .btn-azul { background: #3692e7; color: white; width: 100%; }
        .btn-verde { background: #629924; color: white; width: 100%; }
        button:hover { background: #76b82a; }
        .btn-secundario { background: #3498db; margin-bottom: 20px; font-size: 18px; padding: 15px 30px;}
        .btn-secundario:hover { background: #2980b9; }
        input[type="file"] { margin-bottom: 10px; background: #302e2c; padding: 10px; border-radius: 5px;}
        #pantalla-carga { background: #302e2c; padding: 30px; border-radius: 10px; margin-top: 20px; }
        .oculto { display: none !important; }
        #pantalla-carga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="pantalla-carga" class="info-box">
                <h1>🧠 Memoria con Tablero Vacío</h1>

        <p>¿Qué base de datos quieres usar?</p>
        <button id="btn-defecto" class="btn-secundario">🎮 Usar la base del juego</button>
        <hr style="border: 1px solid #444; margin: 20px 0;">
        <p style="font-size: 0.9em;">O sube tu propio archivo <strong>.json</strong>:</p>
        <input type="file" id="archivoInput" accept=".json">
    </div>

    <div id="contenedor-juego" class="oculto">
        <h1>Memoriza la Posición</h1>
        <div id="barra-tiempo-container">
            <div id="barra-tiempo" style="width: 100%;"></div>
        </div>
        <div id="tablero-container">
            <div id="tablero"></div>
            <div id="cortina">
                <button class="btn-amarillo" onclick="comenzarMemorizacion()">MEMORIZAR (5s)</button>
            </div>
        </div>
        <div id="zona-respuesta">
            <div style="text-align: left; color: #e5bf00; font-weight: bold;">El tablero está vacío... ¿Dónde estaban las piezas?</div>
            <textarea id="textoUsuario" placeholder="Ej: Rey blanco en g1, Dama en h5..."></textarea>
            <button id="btn-comprobar" class="btn-azul" onclick="verSolucion()">👁️ VER SOLUCIÓN</button>
            <button id="btn-siguiente" class="btn-verde oculto" onclick="siguienteRonda()">SIGUIENTE ➡</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>

    <script>
        let todosLosPuzzles = {};
        let puzzleActual = null;
        let game = new Chess();
        let board = null;
        let tiempoObservacion = 5000; 
        let temporizador = null;

        document.getElementById('btn-defecto').addEventListener('click', function() {
            let boton = this; boton.innerText = "Cargando..."; 
            fetch('mis_puzzles.json').then(response => {
                if (!response.ok) throw new Error('No se encontró el archivo'); return response.json();
            }).then(data => { todosLosPuzzles = data; iniciarPantallaJuego(); })
            .catch(error => { alert("⚠️ Error."); boton.innerText = "🎮 Usar la base del juego"; });
        });

        document.getElementById('archivoInput').addEventListener('change', function(e) {
            const archivo = e.target.files[0]; if (!archivo) return;
            const lector = new FileReader();
            lector.onload = function(e) { todosLosPuzzles = JSON.parse(e.target.result); iniciarPantallaJuego(); };
            lector.readAsText(archivo);
        });

        function iniciarPantallaJuego() {
            document.getElementById('pantalla-carga').classList.add('oculto');
            document.getElementById('contenedor-juego').classList.remove('oculto');
            board = Chessboard('tablero', { pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
        }

        function comenzarMemorizacion() {
            document.getElementById('cortina').classList.add('oculto'); 
            document.getElementById('zona-respuesta').style.display = 'none';
            document.getElementById('textoUsuario').value = "";
            document.getElementById('btn-comprobar').classList.remove('oculto');
            document.getElementById('btn-siguiente').classList.add('oculto');

            cargarPuzzleAleatorio();

            let barra = document.getElementById('barra-tiempo');
            barra.style.transition = 'none'; barra.style.width = '100%';
            setTimeout(() => { barra.style.transition = `width ${tiempoObservacion}ms linear`; barra.style.width = '0%'; }, 50);

            if (temporizador) clearTimeout(temporizador);
            temporizador = setTimeout(() => { faseReconstruccion(); }, tiempoObservacion);
        }

        function cargarPuzzleAleatorio() {
            let listas = Object.values(todosLosPuzzles); let listaPlana = listas.flat();
            if (listaPlana.length === 0) return;
            puzzleActual = listaPlana[Math.floor(Math.random() * listaPlana.length)];
            game.load(puzzleActual.fen); board.position(game.fen());
        }

        function faseReconstruccion() {
            // Ocultamos todo el contenedor del tablero en lugar de borrar las piezas
            document.getElementById('tablero-container').style.display = 'none'; 
            
            document.getElementById('zona-respuesta').style.display = 'flex';
            document.getElementById('textoUsuario').focus();
        }

        function verSolucion() {
            // Volvemos a mostrar el contenedor del tablero
            document.getElementById('tablero-container').style.display = 'block'; 
            board.position(game.fen());
            
            document.getElementById('btn-comprobar').classList.add('oculto');
            document.getElementById('btn-siguiente').classList.remove('oculto');
        }
        function siguienteRonda() {
            // Nos aseguramos de que el tablero esté visible para la cortina
            document.getElementById('tablero-container').style.display = 'block'; 
            
            document.getElementById('cortina').classList.remove('oculto');
            document.getElementById('zona-respuesta').style.display = 'none';
            let barra = document.getElementById('barra-tiempo');
            barra.style.transition = 'none'; barra.style.width = '100%';
        }
    </script>
</body>
</html>
