<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Puzzle Storm Tiempo - Modo Duelo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text); text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        h1 { color: var(--accent); margin-bottom: 5px; }
        
        #marcador { display: flex; gap: 20px; background: #1e1e1e; padding: 15px 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-size: 1.5em; }
        .dato { display: flex; flex-direction: column; align-items: center; }
        .dato span { font-size: 0.6em; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .dato strong { color: #fff; font-size: 1.4em; }
        #timerBox strong { color: var(--accent); font-family: 'Consolas', monospace; }
        
        .tiempo-extra { color: var(--success) !important; animation: parpadeoVerde 0.5s 3; font-weight: bold; }
        .tiempo-menos { color: var(--danger) !important; animation: parpadeoRojo 0.5s 3; font-weight: bold; }
        @keyframes parpadeoVerde { 50% { color: #fff; transform: scale(1.2); } }
        @keyframes parpadeoRojo { 50% { color: #fff; transform: scale(1.2); } }
        
        #tablero { width: 450px; margin: 0 auto; touch-action: none !important;}
        .pantalla-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        .btn-cargar { background: var(--success); color: white; padding: 15px 30px; font-size: 20px; }
        button:hover { filter: brightness(1.1); transform: scale(1.05); }
        button.rojo { background: var(--danger); color: white; padding: 15px 30px; } 
        button.azul { background: var(--blue); color: white; padding: 15px 30px; }
        button.gris { background: #444; color: white; padding: 15px 30px; }
        
        #mensaje-final h2 { font-size: 3em; color: var(--accent); margin: 0; }
        #status { margin-top: 10px; font-weight: bold; min-height: 24px; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="pantalla-carga" class="info-box" style="margin-top: 50px; padding: 20px; background: var(--panel-bg); border-radius: 12px; border: 1px solid #444;">
        <h1 id="title-main" style="color: var(--text);">⚡ Puzzle Storm Tiempo ⚡</h1>
        <p style="color: #aaa;">Para jugar, carga tu archivo de puzzles:</p>
        <input type="file" id="archivoInput" accept=".json">
        <br><br>
        <button id="btn-defecto" class="btn-cargar">🎮 Usar la base del juego</button>
        <br>
        <a id="btn-back-carga" href="index.html" style="text-decoration:none;"><button class="gris" style="margin-top: 20px;">⬅ Volver al Menú</button></a>
    </div>

    <div id="pantalla-inicio" class="pantalla-overlay oculto">
        <h1 style="font-size: 3em;">⏱️ Modo Examen ⏱️</h1>
        <ul style="text-align: left; font-size: 1.2em; color: #ccc; margin-bottom: 30px; line-height: 1.6;">
            <li>❌ <strong>Fallo:</strong> Penalización de tiempo y saltas.</li>
            <li>🔍 <strong>Final:</strong> Repaso con la solución.</li>
        </ul>
        <button class="btn-cargar" onclick="empezarPartida()">¡EMPEZAR!</button>
    </div>

    <div id="pantalla-fin" class="pantalla-overlay oculto">
        <div id="mensaje-final">
            <h2>¡TIEMPO AGOTADO!</h2>
            <p>Puntuación: <strong id="scoreFinal">0</strong></p>
            <div style="margin-top: 20px;">
                <button class="rojo" onclick="location.reload()">Jugar de Nuevo</button>
                <button id="btn-repaso" class="azul oculto" onclick="iniciarRepaso()">🔍 Revisar Fallos (<span id="countFallos">0</span>)</button>
            </div>
        </div>
    </div>

    <div id="interfaz-juego" class="oculto">
        <div id="marcador">
            <div class="dato" id="timerBox"><span>Tiempo</span><strong id="timerDisplay">05:00</strong></div>
            <div class="dato"><span>Puntos</span><strong id="puntosDisplay">0</strong></div>
            <div class="dato"><span>Racha</span><strong id="rachaDisplay">0</strong></div>
            <div class="dato"><span>Nivel</span><strong id="eloDisplay" style="color: var(--accent);">1700</strong></div>
        </div>
        <div id="tablero"></div>
        <div id="status">Juegan...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="utils.js"></script>

    <script>
        const TIEMPO_INICIAL = 180; const PENALIZACION = 10;    
        let todosLosPuzzles = {}; let puzzlesFallados = [];
        let game = new Chess(); let board = null;
        let eloActual = 1700; let puzzleActual = null; let indiceMovimiento = 0;
        let puntos = 0; let racha = 0; let tiempoRestante = TIEMPO_INICIAL; let intervaloReloj = null; let juegoActivo = false;

        inicializarCargaBaseDatos('mis_puzzles.json', 'btn-defecto', 'archivoInput', function(data) {
            todosLosPuzzles = data; iniciarPantallaJuego();
        });

        function iniciarPantallaJuego() {
            document.getElementById('pantalla-carga').classList.add('oculto');
            
            // LÓGICA DE DUELO: Saltar menús
            if (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) {
                document.getElementById('btn-back-carga').style.display = 'none';
                document.getElementById('title-main').style.display = 'none';
                empezarPartida();
            } else {
                document.getElementById('pantalla-inicio').classList.remove('oculto');
            }
        }

        function empezarPartida() {
            document.getElementById('pantalla-inicio').classList.add('oculto');
            document.getElementById('interfaz-juego').classList.remove('oculto');
            board = Chessboard('tablero', { draggable: true, position: 'start', pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd });
            juegoActivo = true; 
            
            let p = obtenerPerfil(); 
            eloActual = p.eloNormal || 1700; 
            
            cargarNuevoPuzzle(); 
            arrancarReloj();
        }

        function arrancarReloj() {
            if (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) {
                document.getElementById('timerBox').style.display = 'none';
                return;
            }
            actualizarRelojVisual();
            intervaloReloj = setInterval(() => { 
                tiempoRestante--; actualizarRelojVisual(); 
                if (tiempoRestante <= 10 && tiempoRestante > 0) reproducirSonido('tick');
                if (tiempoRestante <= 0) finDelJuego(); 
            }, 1000);
        }

        function actualizarRelojVisual() {
            let m = Math.floor(tiempoRestante / 60); let s = tiempoRestante % 60;
            document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function cargarNuevoPuzzle() {
            if (!juegoActivo) return;
            document.getElementById('status').innerText = "";
            
            let rango = (Math.floor(eloActual / 50) * 50).toString();
            if (eloActual > 2500) rango = "2500"; 
            if (!todosLosPuzzles[rango]) rango = Object.keys(todosLosPuzzles)[0] || "1700";
            let lista = todosLosPuzzles[rango]; 

            // SINCRONIZACIÓN MAESTRA
            let indiceElegido = (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) 
                                ? DueloManager.obtenerIndiceSincronizado(lista.length) 
                                : Math.floor(Math.random() * lista.length);
            
            puzzleActual = lista[indiceElegido];

            if (typeof puzzleActual.moves === 'string') puzzleActual.moves = puzzleActual.moves.split(' ');
            indiceMovimiento = 0; game.load(puzzleActual.fen);
            hacerMovimiento(puzzleActual.moves[indiceMovimiento]); indiceMovimiento++;
            board.orientation(game.turn() === 'w' ? 'white' : 'black'); board.position(game.fen());
            document.getElementById('eloDisplay').innerText = eloActual;
        }

        function hacerMovimiento(m) { let from = m.substring(0,2); let to = m.substring(2,4); let promo = m.length > 4 ? m.substring(4,5) : 'q'; game.move({ from: from, to: to, promotion: promo }); }
        function onDragStart(s, p) { if (!juegoActivo || game.game_over()) return false; if ((game.turn() === 'w' && p.search(/^b/) !== -1) || (game.turn() === 'b' && p.search(/^w/) !== -1)) return false; }

        function onDrop(source, target) {
            if (!juegoActivo) return 'snapback';
            let move = game.move({ from: source, to: target, promotion: 'q' }); if (move === null) return 'snapback';
            let miMovimiento = source + target + (move.promotion || "");

            if (miMovimiento.startsWith(puzzleActual.moves[indiceMovimiento])) {
                indiceMovimiento++;
                if (indiceMovimiento < puzzleActual.moves.length) {
                    setTimeout(() => { hacerMovimiento(puzzleActual.moves[indiceMovimiento]); board.position(game.fen()); indiceMovimiento++; if (indiceMovimiento >= puzzleActual.moves.length) puzzleCompletado(); }, 200);
                } else { puzzleCompletado(); }
            } else {
                reproducirSonido('incorrecto');
                puzzlesFallados.push(puzzleActual);
                
                if (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) {
                    puntos = Math.max(0, puntos - 1); 
                    DueloManager.enviarPuntos(puntos);
                } else {
                    tiempoRestante -= PENALIZACION; actualizarRelojVisual();
                }
                
                document.getElementById('puntosDisplay').innerText = puntos;
                racha = 0; document.getElementById('rachaDisplay').innerText = racha;
                setTimeout(cargarNuevoPuzzle, 400); return 'snapback';
            }
        }

        function puzzleCompletado() {
            reproducirSonido('correcto');
            puntos++; 
            racha++; 
            
            if (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) {
                if (racha % 5 === 0) puntos += 3; // Bonus puntos en duelo
                DueloManager.enviarPuntos(puntos);
            } else {
                if (racha % 5 === 0) { tiempoRestante += 10; actualizarRelojVisual(); }
            }

            document.getElementById('puntosDisplay').innerText = puntos;
            document.getElementById('rachaDisplay').innerText = racha;
            setTimeout(cargarNuevoPuzzle, 300);
        }

        function finDelJuego() {
            juegoActivo = false; clearInterval(intervaloReloj); reproducirSonido('fin');
            if (!DueloManager.enDuelo) actualizarEstadisticaGlobal('stormTiempoMax', puntos, false);
            document.getElementById('scoreFinal').innerText = puntos; 
            document.getElementById('pantalla-fin').classList.remove('oculto');
            if (puzzlesFallados.length > 0) { document.getElementById('btn-repaso').classList.remove('oculto'); document.getElementById('countFallos').innerText = puzzlesFallados.length; }
        }

        function onSnapEnd() { board.position(game.fen()); }
    </script>
</body>
</html>
