<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrenamiento Flash Memory Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root {
            --bg-color: #262421;
            --panel-bg: #302e2c;
            --accent: #e5bf00;
            --success: #629924;
            --blue: #3692e7;
            --danger: #cc3333;
            --text: #bababa;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            user-select: none;
        }

        h1 { color: var(--accent); margin-top: 0; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);}

        /* Layout Principal a dos columnas CENTRADO */
        #main-layout {
            display: flex;
            flex-direction: row;
            gap: 30px; /* Gap reducido para que estén más juntitos */
            width: 100%;
            max-width: 1200px;
            justify-content: center; /* Centra todo el bloque en la pantalla */
            align-items: flex-start;
        }

        @media (max-width: 900px) {
            #main-layout { flex-direction: column; align-items: center; }
            #sidebar { width: 100%; max-width: 450px; }
        }

        /* Columna Izquierda: Área de Juego */
        #game-area {
            /* Al quitar flex: 1, este contenedor solo ocupará lo que midan sus tableros */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cronómetro y Barra */
        #timer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            max-width: 400px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        #segundos-num { font-size: 2.2em; color: var(--accent); line-height: 1; }
        
        #barra-tiempo-container { width: 100%; max-width: 400px; height: 12px; background: #1a1917; border-radius: 6px; overflow: hidden; margin-bottom: 15px; display: none; }
        #barra-tiempo { height: 100%; width: 100%; background: var(--blue); transition: width linear; }

        #boards-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .board-wrapper {
            width: 400px; 
            text-align: center;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .board-title {
            font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px;
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .visible { opacity: 1; }

        .chess-board { width: 100%; border: 6px solid #3d3a37; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; background: #262421; }

        /* Columna Derecha: Panel Lateral */
        #sidebar {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-box {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #444;
        }

        .panel-title { font-weight: bold; color: var(--accent); margin-bottom: 15px; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; text-align: center;}

        /* Mensajes de Estado */
        #status-panel { text-align: center; min-height: 60px; display: flex; align-items: center; justify-content: center; background: #1a1917; border-radius: 6px; padding: 10px; margin-bottom: 20px; border: 1px solid #333;}
        .mensaje { font-size: 1.3em; font-weight: bold; line-height: 1.4; }
        .text-ready { color: #888; }
        .text-mem { color: var(--blue); }
        .text-build { color: var(--accent); }
        .text-win { color: var(--success); }
        .text-fail { color: var(--danger); }

        /* Controles */
        select { background: #262421; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 6px; font-size: 1.1em; width: 100%; cursor: pointer; outline: none;}
        select:focus { border-color: var(--accent); }

        button { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; margin-top: 15px; }
        .btn-inicio { background: var(--accent); color: #262421; font-size: 1.3em; padding: 15px; box-shadow: 0 4px 0 #b39500; }
        .btn-inicio:hover { background: #ffe03d; transform: translateY(-2px); box-shadow: 0 6px 0 #b39500; }
        .btn-inicio:active { transform: translateY(2px); box-shadow: 0 2px 0 #b39500; }
        
        .btn-comprobar { background: var(--success); color: white; padding: 15px; font-size: 1.3em; box-shadow: 0 4px 0 #4a751b; }
        .btn-comprobar:hover { background: #76b82a; transform: translateY(-2px); box-shadow: 0 6px 0 #4a751b; }

        /* Estadísticas */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #262421; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #3d3a37; }
        .stat-value { display: block; font-size: 2em; font-weight: bold; }
        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; margin-top: 5px; display: block;}

        /* Feedback Bordes */
        .border-fail { border-color: var(--danger) !important; }
        .border-win { border-color: var(--success) !important; }

        .oculto { display: none !important; }
    </style>
</head>
<body>

    <h1>📸 Flash Memory Pro</h1>
    
    <div id="main-layout">
        
        <div id="game-area">
            
            <div id="timer-header" class="oculto">
                <span style="font-size: 0.9em; color: #888; text-transform: uppercase;">TIEMPO RESTANTE</span>
                <span id="segundos-num">6s</span>
            </div>
            <div id="barra-tiempo-container"><div id="barra-tiempo"></div></div>
            
            <div id="boards-container">
                <div id="user-container" class="board-wrapper">
                    <div id="user-title" class="board-title">Tu Tablero</div>
                    <div id="myBoard" class="chess-board"></div>
                </div>

                <div id="solution-container" class="board-wrapper oculto">
                    <div class="board-title visible" style="color: var(--success);">Solución Correcta</div>
                    <div id="solutionBoard" class="chess-board"></div>
                </div>
            </div>
        </div>

        <div id="sidebar">
            <div class="panel-box">
                <div class="panel-title">Panel de Control</div>
                
                <div id="status-panel">
                    <div id="msg" class="mensaje text-ready">Selecciona la dificultad y pulsa Memorizar.</div>
                </div>
                
                <div id="diff-selector">
                    <label style="color:#888; font-size:0.85em; display:block; margin-bottom:5px; text-transform:uppercase;">Dificultad (Piezas):</label>
                    <select id="piezas-count">
                        <option value="3">🟢 Fácil (3 piezas)</option>
                        <option value="5" selected>🟡 Normal (5 piezas)</option>
                        <option value="8">🔴 Difícil (8 piezas)</option>
                        <option value="12">🔥 Locura (12 piezas)</option>
                    </select>
                </div>

                <button id="btn-start" class="btn-inicio" onclick="empezarRonda()">MEMORIZAR (6s)</button>
                <button id="btn-check" class="btn-comprobar oculto" onclick="comprobar()">✅ ¡COMPROBAR!</button>
            </div>

            <div class="panel-box">
                <div class="panel-title">Estadísticas</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span id="stat-rondas" class="stat-value" style="color: var(--blue);">0</span>
                        <span class="stat-label">Jugadas</span>
                    </div>
                    <div class="stat-card">
                        <span id="stat-aciertos" class="stat-value" style="color: var(--success);">0</span>
                        <span class="stat-label">Aciertos</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var userBoard = null;
        var solutionBoard = null;
        var solucionFEN = ''; 
        var tiempoFlash = 6000; // 6 Segundos
        var pieceThemeUrl = 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png';
        var intervaloNum = null;
        
        // Estadísticas
        var rondasJugadas = 0;
        var aciertos = 0;

        // Iniciar tablero vacío al cargar la página
        userBoard = Chessboard('myBoard', {
            position: 'empty',
            draggable: false,
            sparePieces: false,
            pieceTheme: pieceThemeUrl
        });

        function empezarRonda() {
            // Reset de UI
            document.getElementById('solution-container').classList.add('oculto');
            document.getElementById('user-title').classList.remove('visible');
            document.getElementById('myBoard').classList.remove('border-fail', 'border-win');

            document.getElementById('btn-start').classList.add('oculto');
            document.getElementById('btn-check').classList.add('oculto');
            document.getElementById('piezas-count').disabled = true;
            
            // Generar Posición
            let numPiezas = parseInt(document.getElementById('piezas-count').value);
            solucionFEN = generarPosicionAleatoria(numPiezas);
            
            if (userBoard) userBoard.destroy();
            userBoard = Chessboard('myBoard', {
                position: solucionFEN,
                draggable: false,
                sparePieces: false,
                showNotation: true,
                pieceTheme: pieceThemeUrl
            });

            // Mensajes
            let msg = document.getElementById('msg');
            msg.innerText = "¡MEMORIZA LA POSICIÓN!";
            msg.className = "mensaje text-mem";
            
            // UI del Tiempo y Barra
            document.getElementById('timer-header').classList.remove('oculto');
            let barContainer = document.getElementById('barra-tiempo-container');
            let barra = document.getElementById('barra-tiempo');
            barContainer.style.display = 'block';
            barra.style.transition = 'none';
            barra.style.width = '100%';
            
            // Cronómetro Numérico
            let t = tiempoFlash / 1000;
            const displayNum = document.getElementById('segundos-num');
            displayNum.innerText = t + "s";
            displayNum.style.color = "var(--accent)";

            if (intervaloNum) clearInterval(intervaloNum);
            intervaloNum = setInterval(() => {
                t--;
                if (t >= 0) {
                    displayNum.innerText = t + "s";
                    if (t <= 1) displayNum.style.color = "var(--danger)"; // Rojo en el último segundo
                }
                if (t <= 0) clearInterval(intervaloNum);
            }, 1000);

            // Animación Barra
            setTimeout(() => {
                barra.style.transition = `width ${tiempoFlash}ms linear`;
                barra.style.width = '0%';
            }, 50);

            // Transición a fase de reconstrucción
            setTimeout(() => {
                faseReconstruccion();
            }, tiempoFlash);
        }

        function faseReconstruccion() {
            let msg = document.getElementById('msg');
            msg.innerText = "¡RECONSTRUYE!\nArrastra las piezas al tablero.";
            msg.className = "mensaje text-build";
            
            // Ocultar Cronómetro y Barra
            document.getElementById('timer-header').classList.add('oculto');
            document.getElementById('barra-tiempo-container').style.display = 'none';
            document.getElementById('user-title').classList.add('visible');

            if (userBoard) userBoard.destroy();
            userBoard = Chessboard('myBoard', {
                position: 'empty',
                draggable: true,
                dropOffBoard: 'trash',
                sparePieces: true,
                showNotation: true,
                pieceTheme: pieceThemeUrl
            });

            document.getElementById('btn-check').classList.remove('oculto');
        }

        function comprobar() {
            rondasJugadas++;
            document.getElementById('stat-rondas').innerText = rondasJugadas;

            let fenUsuario = userBoard.fen();
            let colocacionSolucion = solucionFEN.split(' ')[0];
            let colocacionUsuario = fenUsuario.split(' ')[0];

            let msg = document.getElementById('msg');

            if (colocacionUsuario === colocacionSolucion) {
                aciertos++;
                document.getElementById('stat-aciertos').innerText = aciertos;
                
                msg.innerText = "✅ ¡PERFECTO!\nMemoria fotográfica.";
                msg.className = "mensaje text-win";
                document.getElementById('myBoard').classList.add('border-win');
                
                userBoard = Chessboard('myBoard', {
                    position: fenUsuario,
                    draggable: false,
                    showNotation: true,
                    pieceTheme: pieceThemeUrl
                });

            } else {
                msg.innerText = "❌ DIFERENCIAS DETECTADAS\nCompara con la solución.";
                msg.className = "mensaje text-fail";
                document.getElementById('myBoard').classList.add('border-fail');

                // Mostrar panel de solución
                document.getElementById('solution-container').classList.remove('oculto');

                // Recargar tablero de usuario deshabilitando el arrastre
                userBoard.destroy();
                userBoard = Chessboard('myBoard', {
                    position: fenUsuario,
                    draggable: false, 
                    showNotation: true,
                    pieceTheme: pieceThemeUrl
                });

                // Cargar tablero de solución
                setTimeout(() => {
                    userBoard.resize(); // Ajustar por si el contenedor cambió de tamaño
                    if (solutionBoard) solutionBoard.destroy();
                    solutionBoard = Chessboard('solutionBoard', {
                        position: solucionFEN,
                        draggable: false,
                        showNotation: true,
                        pieceTheme: pieceThemeUrl
                    });
                }, 50);
            }

            // Cambiar botones
            document.getElementById('btn-check').classList.add('oculto');
            setTimeout(() => {
                let btnStart = document.getElementById('btn-start');
                btnStart.innerText = "SIGUIENTE RONDA";
                btnStart.classList.remove('oculto');
                document.getElementById('piezas-count').disabled = false;
            }, 200);
        }

        // --- LÓGICA DE GENERACIÓN DE POSICIONES ---
        function generarPosicionAleatoria(nPiezas) {
            let g = new Chess();
            g.clear();
            const piezasTipo = ['p', 'n', 'b', 'r', 'q'];
            let ocupadas = new Set();

            let k1 = casAleatoria();
            g.put({ type: 'k', color: 'w' }, k1);
            ocupadas.add(k1);
            
            let k2 = casAleatoria();
            while (distanciaRey(k1, k2) <= 1 || ocupadas.has(k2)) { k2 = casAleatoria(); }
            g.put({ type: 'k', color: 'b' }, k2);
            ocupadas.add(k2);

            for (let i = 0; i < nPiezas; i++) {
                let cas = casAleatoria();
                while (ocupadas.has(cas)) { cas = casAleatoria(); }
                
                let tipo = piezasTipo[Math.floor(Math.random() * piezasTipo.length)];
                let color = Math.random() > 0.5 ? 'w' : 'b';
                
                if (tipo === 'p' && (cas.includes('1') || cas.includes('8'))) tipo = 'n';

                g.put({ type: tipo, color: color }, cas);
                ocupadas.add(cas);
            }
            return g.fen();
        }

        function casAleatoria() {
            const c = ['a','b','c','d','e','f','g','h'];
            const f = [1,2,3,4,5,6,7,8];
            return c[Math.floor(Math.random()*8)] + f[Math.floor(Math.random()*8)];
        }

        function distanciaRey(c1, c2) {
            let x1 = c1.charCodeAt(0), y1 = parseInt(c1[1]);
            let x2 = c2.charCodeAt(0), y2 = parseInt(c2[1]);
            return Math.max(Math.abs(x1-x2), Math.abs(y1-y2));
        }
    </script>
</body>
</html>
