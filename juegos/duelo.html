<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena de Duelos ⚔️</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* PANTALLAS DE CARGA Y FIN */
        .pantalla-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1917;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }

        .titulo-vs {
            font-family: 'Black Ops One', cursive;
            font-size: 4em;
            color: #e5bf00;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px #000;
        }

        .btn-salir {
            background: #cc3333;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
        }
        
        .btn-salir:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* HUD SUPERIOR DEL DUELO */
        #hud-duelo {
            width: 100%;
            height: 80px;
            background: linear-gradient(to bottom, #222, #000);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 3px solid #e5bf00;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .jugador-box {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        .jugador-box.derecha {
            justify-content: flex-end;
        }

        .nombre {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }

        .puntos {
            font-family: 'Black Ops One', cursive;
            font-size: 2.5em;
            color: #3692e7;
            background: #111;
            padding: 5px 20px;
            border-radius: 8px;
            border: 2px solid #333;
        }

        .puntos-rival {
            color: #cc3333;
        }

        #timer-box {
            font-family: 'Black Ops One', cursive;
            font-size: 3.5em;
            color: #e5bf00;
            text-shadow: 0 0 10px rgba(229, 191, 0, 0.5);
        }

        .timer-danger {
            color: #cc3333 !important;
            animation: latido 0.5s infinite;
        }

        /* IFRAME DEL JUEGO */
        #game-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #262421;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

    <div id="pantalla-espera" class="pantalla-full">
        <h1 class="titulo-vs">PREPARANDO ARENA</h1>
        <p style="font-size: 1.5em; color: #aaa;">Sincronizando jugadores...</p>
    </div>

    <div id="hud-duelo" style="display: none;">
        <div class="jugador-box">
            <span id="mi-nombre" class="nombre">TÚ</span>
            <span id="mis-puntos" class="puntos">0</span>
        </div>

        <div id="timer-box">0:00</div>

        <div class="jugador-box derecha">
            <span id="puntos-rival" class="puntos puntos-rival">0</span>
            <span id="nombre-rival" class="nombre" style="color: #aaa;">RIVAL</span>
        </div>
    </div>

    <iframe id="game-frame" style="display: none;"></iframe>

    <div id="pantalla-fin" class="pantalla-full" style="display: none; background: rgba(0,0,0,0.95);">
        <h1 id="texto-resultado" class="titulo-vs" style="font-size: 6em;">¡TIEMPO!</h1>
        <h2 id="subtexto-resultado" style="color: #fff; font-size: 2em; margin-top: 0; margin-bottom: 40px;">Calculando ganador...</h2>
        
        <div style="display: flex; gap: 20px; justify-content: center;">
            <button id="btn-revancha" onclick="pedirRevancha()" class="btn-salir" style="background: var(--green);">⚔️ Revancha</button>
            <button onclick="salirDuelo()" class="btn-salir" style="background: #444;">⬅ Volver a la Plaza</button>
        </div>
    </div>

    <script src="utils.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const salaId = urlParams.get('sala');

        let miUid, miNombre, rivalUid;
        let esCreador = false;
        let datosSala = null;
        let intervaloReloj = null;
        
        // Reloj sincronizado universal
        let serverOffset = 0;

        // DICCIONARIO PARA CARGAR EL ARCHIVO CORRECTO
        const mapJuegos = {
            'storm': 'juego.html',
            'storm_fantasma': 'juego.html?vis=vacio',
            'storm_ciego': 'juego_ciego.html',
            'radar': 'juego_radar.html',
            'flash': 'juego_flash.html',
            'memoria_pro': 'juego_memoria2.html',
            'lector': 'juego_lectura.html',
            'tiempo': 'juego_tiempo.html',
            'arcade_teclado': 'arcade_ciego.html',
            'arcade_voz': 'arcade_ciego2.html',
            'entrenamiento_ciego': 'entrenamiento_ciego.html'
        };

        window.onload = () => {
            if (!salaId) { window.location.href = 'index.html'; return; }

            // Obtenemos la desviación de tiempo de Firebase
            firebase.database().ref('.info/serverTimeOffset').on('value', snap => {
                serverOffset = snap.val() || 0;
            });

            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    miUid = user.uid;
                    miNombre = localStorage.getItem('current_user_name') || user.displayName;
                    document.getElementById('mi-nombre').innerText = miNombre;
                    conectarSala();
                } else {
                    window.location.href = 'index.html';
                }
            });
        };

        function conectarSala() {
            let refSala = firebase.database().ref('duelos/' + salaId);

            refSala.on('value', (snap) => {
                datosSala = snap.val();
                
                // Si la sala ha sido borrada (alguien le dio a "Volver a la Plaza")
                if (!datosSala) {
                    alert("La sala ha sido cerrada (el rival ha abandonado).");
                    window.location.href = 'index.html';
                    return;
                }

                esCreador = (datosSala.creador === miUid);
                rivalUid = esCreador ? datosSala.rival : datosSala.creador;

                // 1. PRIMER INICIO: Avisamos de que estamos listos
                if (datosSala.estado === 'aceptado' && !datosSala['listo_' + miUid]) {
                    refSala.child('listo_' + miUid).set(true);
                }

                // 2. PRIMER INICIO: El creador da la orden de empezar
                if (esCreador && datosSala.estado === 'aceptado' && datosSala['listo_' + datosSala.creador] && datosSala['listo_' + datosSala.rival]) {
                    let tiempoActualReal = Date.now() + serverOffset;
                    refSala.update({
                        estado: 'jugando',
                        tiempoFin: tiempoActualReal + (parseInt(datosSala.tiempo) * 1000)
                    });
                }

                // 3. BUCLE DE REVANCHA: Si ambos quieren jugar de nuevo, el creador reinicia la partida
                if (esCreador && datosSala.estado === 'finalizado' && datosSala['revancha_' + datosSala.creador] && datosSala['revancha_' + datosSala.rival]) {
                    let tiempoActualReal = Date.now() + serverOffset;
                    refSala.update({
                        estado: 'jugando',
                        tiempoFin: tiempoActualReal + (parseInt(datosSala.tiempo) * 1000),
                        ['revancha_' + datosSala.creador]: null, // Reseteamos la confirmación
                        ['revancha_' + datosSala.rival]: null,
                        puntos: null // Limpiamos los puntos de la partida anterior
                    });
                }

                // 4. ¡EL DUELO COMIENZA! (Se oculta todo y arranca el iframe)
                if (datosSala.estado === 'jugando' && document.getElementById('game-frame').style.display === 'none') {
                    iniciarArena();
                }

                // 5. ACTUALIZAR MARCADORES EN DIRECTO
                if (datosSala.puntos) {
                    document.getElementById('mis-puntos').innerText = datosSala.puntos[miUid] || 0;
                    document.getElementById('puntos-rival').innerText = datosSala.puntos[rivalUid] || 0;
                }
            });

            // Obtener el nombre del rival
            firebase.database().ref('users/' + rivalUid + '/nombreJugador').once('value').then(s => {
                document.getElementById('nombre-rival').innerText = s.val() || "Rival";
            });
        }

        function iniciarArena() {
            document.getElementById('pantalla-espera').style.display = 'none';
            document.getElementById('pantalla-fin').style.display = 'none'; // Importante para cuando hay revancha
            document.getElementById('hud-duelo').style.display = 'flex';

            // Limpiamos los marcadores visuales para el nuevo duelo
            document.getElementById('mis-puntos').innerText = "0";
            document.getElementById('puntos-rival').innerText = "0";

            let frame = document.getElementById('game-frame');
            frame.style.display = 'block';

            let archivoJuego = mapJuegos[datosSala.juego] || 'juego.html';
            let separador = archivoJuego.includes('?') ? '&' : '?';
            
            // LA MAGIA DE LA REVANCHA: Añadimos un número aleatorio (rnd) para obligar 
            // al navegador a recargar el iframe del mini-juego por completo desde cero.
            frame.src = `${archivoJuego}${separador}duelo=true&sala=${salaId}&rnd=${Date.now()}`;

            arrancarReloj();
        }

        function arrancarReloj() {
            let timerBox = document.getElementById('timer-box');
            timerBox.classList.remove('timer-danger'); // Reiniciar color rojo

            intervaloReloj = setInterval(() => {
                let tiempoActualReal = Date.now() + serverOffset;
                let restante = Math.floor((datosSala.tiempoFin - tiempoActualReal) / 1000);

                if (restante <= 0) {
                    clearInterval(intervaloReloj);
                    finalizarDuelo();
                    return;
                }

                let min = Math.floor(restante / 60);
                let sec = restante % 60;
                timerBox.innerText = `${min}:${sec.toString().padStart(2, '0')}`;

                if (restante <= 10) timerBox.classList.add('timer-danger');
            }, 1000);
        }

        function finalizarDuelo() {
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('pantalla-fin').style.display = 'flex';
            
            // Mostramos el botón de revancha por si lo habíamos ocultado en la ronda anterior
            document.getElementById('btn-revancha').style.display = 'block';

            reproducirSonido('fin');

            let misPts = datosSala.puntos ? (datosSala.puntos[miUid] || 0) : 0;
            let rivalPts = datosSala.puntos ? (datosSala.puntos[rivalUid] || 0) : 0;

            let texto = document.getElementById('texto-resultado');
            let sub = document.getElementById('subtexto-resultado');

            if (misPts > rivalPts) {
                texto.innerText = "¡VICTORIA!";
                texto.style.color = "var(--green)";
                sub.innerText = `Has destrozado a tu rival (${misPts} a ${rivalPts})`;
                registrarXP('maestro', true); 
            } else if (misPts < rivalPts) {
                texto.innerText = "DERROTA";
                texto.style.color = "var(--red)";
                sub.innerText = `El rival fue más rápido (${misPts} a ${rivalPts})`;
            } else {
                texto.innerText = "EMPATE";
                texto.style.color = "#aaa";
                sub.innerText = `Ambos hicisteis ${misPts} puntos`;
            }

            // Cambiamos el estado de la sala, ¡pero NO LA BORRAMOS!
            if (esCreador) {
                firebase.database().ref('duelos/' + salaId).update({ estado: 'finalizado' });
            }
        }

        // =========================================================
        // NUEVAS FUNCIONES DE BUCLE INFINITO DE DUELO
        // =========================================================
        function pedirRevancha() {
            document.getElementById('btn-revancha').style.display = 'none';
            document.getElementById('subtexto-resultado').innerText = "Esperando a que el rival acepte...";
            document.getElementById('subtexto-resultado').style.color = "var(--accent)";
            
            // Avisamos a Firebase que queremos jugar otra vez
            firebase.database().ref('duelos/' + salaId + '/revancha_' + miUid).set(true);
        }

        function salirDuelo() {
            // Si le damos a salir, destruimos la sala para expulsar también al rival
            firebase.database().ref('duelos/' + salaId).remove().then(() => {
                window.location.href = 'index.html';
            }).catch(() => {
                window.location.href = 'index.html';
            });
        }

        // =========================================================
        // COMUNICACIÓN CON EL IFRAME
        // =========================================================
        window.addEventListener('message', (evento) => {
            if (datosSala && datosSala.estado === 'jugando' && evento.data && evento.data.action === 'actualizarPuntos') {
                firebase.database().ref(`duelos/${salaId}/puntos/${miUid}`).set(evento.data.puntos);
            }
        });
    </script>
</body>

</html>
