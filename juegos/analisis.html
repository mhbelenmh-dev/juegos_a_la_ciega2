<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Gym - Tablero de Análisis</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        :root {
            --bg: #1a1917;
            --panel: #262421;
            --accent: #e5bf00;
            --blue: #3692e7;
            --green: #629924;
            --red: #cc3333;
            --text: #bababa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER IDENTICO */
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: #000; border-bottom: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; z-index: 100;
        }
        #brand-logo { margin: 0; font-size: 1.8em; color: var(--accent); letter-spacing: 1px; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); text-decoration: none; }
        
        #nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-link { color: var(--green); text-decoration: none; font-weight: bold; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; padding: 5px 10px; border-radius: 5px; white-space: nowrap;}
        .nav-link:hover { color: #fff; background: rgba(98, 153, 36, 0.2); transform: scale(1.05); }

        /* LAYOUT PRINCIPAL DE ANÁLISIS */
        #analysis-layout {
            margin-top: 100px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            padding: 20px;
            flex-wrap: wrap;
        }

        /* ZONA DEL TABLERO */
        #board-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }
        
        #tablero {
            width: 100%;
            border: 6px solid #3d3a37;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            touch-action: none !important;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-ctrl {
            flex: 1;
            background: #444;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #222;
            transition: 0.2s;
        }
        .btn-ctrl:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 6px 0 #222;}
        .btn-ctrl:active { transform: translateY(2px); box-shadow: none; }

        /* PANEL LATERAL DE INFORMACIÓN */
        .info-panel {
            background: var(--panel);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #status-box {
            font-size: 1.4em;
            font-weight: bold;
            color: #fff;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
        }

        .data-label { color: #888; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; font-weight: bold;}
        
        textarea, input[type="text"] {
            width: 100%;
            background: #1a1917;
            color: var(--accent);
            border: 1px solid #555;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 1.1em;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
            resize: none;
        }
        textarea:focus, input[type="text"]:focus { border-color: var(--blue); }

        .btn-cargar {
            background: var(--blue);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 4px 0 #20629c;
            transition: 0.2s;
        }
        .btn-cargar:hover { filter: brightness(1.1); transform: translateY(-2px); }

    </style>
</head>

<body>

    <div id="top-bar">
        <a id="brand-logo" href="index.html">♞ CHESS GYM</a>
        <div id="nav-menu">
            <a href="hub_basico.html" class="nav-link">DOMINIO GEOGRÁFICO</a>
            <a href="hub_memoria.html" class="nav-link">MEMORIA</a>
            <a href="hub_tactica.html" class="nav-link">TÁCTICA</a>
            <a href="analisis.html" class="nav-link" style="color: #fff; border-bottom: 2px solid var(--accent);">TABLERO ANÁLISIS</a>
        </div>
        <div style="width: 150px;"></div> </div>

    <div id="analysis-layout">
        
        <div id="board-wrapper">
            <div id="tablero"></div>
            <div class="controls-row">
                <button class="btn-ctrl" onclick="deshacerMovimiento()">⬅️ Deshacer</button>
                <button class="btn-ctrl" onclick="girarTablero()">🔃 Girar</button>
                <button class="btn-ctrl" style="background: var(--danger); box-shadow: 0 4px 0 #8a1f1f;" onclick="reiniciarTablero()">🔄 Reiniciar</button>
            </div>
        </div>

        <div class="info-panel">
            <h2 style="color: var(--accent); margin-top: 0; border-bottom: 2px solid #444; padding-bottom: 10px;">Estudio Libre</h2>
            
            <div id="status-box">Juegan Blancas</div>

            <label class="data-label">PGN de la Partida:</label>
            <textarea id="pgn-data" rows="5" readonly placeholder="Aquí aparecerán tus jugadas..."></textarea>

            <label class="data-label">Código FEN Actual:</label>
            <input type="text" id="fen-data" readonly>

            <div style="margin-top: 10px; padding-top: 20px; border-top: 1px solid #444;">
                <label class="data-label" style="color: var(--blue);">⚙️ Cargar Posición Personalizada:</label>
                <input type="text" id="load-fen-input" placeholder="Pega un FEN y pulsa el botón...">
                <button class="btn-cargar" onclick="cargarFENUsuario()">Cargar Posición FEN</button>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="utils.js"></script>

    <script>
        let board = null;
        let game = new Chess();
        const statusBox = document.getElementById('status-box');
        const pgnData = document.getElementById('pgn-data');
        const fenData = document.getElementById('fen-data');

        function onDragStart(source, piece, position, orientation) {
            // No permitir mover si el juego ha terminado por mate o tablas
            if (game.game_over()) return false;

            // Asegurar que solo mueves la pieza a la que le toca jugar
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            // Intentar hacer el movimiento (por defecto asume coronar a Dama para simplificar)
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            // Si es un movimiento ilegal, devuelve la pieza a su sitio
            if (move === null) return 'snapback';

            reproducirSonido('correcto');
            actualizarEstado();
        }

        // Se ejecuta cuando la animación de soltar la pieza termina
        function onSnapEnd() {
            board.position(game.fen());
        }

        function actualizarEstado() {
            let statusHTML = '';
            let bando = (game.turn() === 'w') ? 'Blancas' : 'Negras';
            let colorTexto = (game.turn() === 'w') ? '#fff' : 'var(--danger)';

            // Comprobar estado de la partida
            if (game.in_checkmate()) {
                statusHTML = `🏆 Jaque Mate. Pierden <span style="color:${colorTexto};">${bando}</span>`;
                reproducirSonido('fin');
            } else if (game.in_draw()) {
                statusHTML = "🤝 Tablas / Empate";
            } else {
                statusHTML = `Juegan <span style="color:${colorTexto}; text-transform:uppercase;">${bando}</span>`;
                if (game.in_check()) {
                    statusHTML += ` <br><span style="color:var(--accent); font-size:0.8em;">(¡Están en Jaque!)</span>`;
                }
            }

            statusBox.innerHTML = statusHTML;
            fenData.value = game.fen();
            pgnData.value = game.pgn();
            
            // Hacer scroll abajo automáticamente en el PGN
            pgnData.scrollTop = pgnData.scrollHeight;
        }

        // CONTROLES DEL TABLERO
        function deshacerMovimiento() {
            game.undo();
            board.position(game.fen());
            actualizarEstado();
        }

        function girarTablero() {
            board.flip();
        }

        function reiniciarTablero() {
            game.reset();
            board.position('start');
            board.orientation('white');
            actualizarEstado();
        }

        function cargarFENUsuario() {
            let inputFen = document.getElementById('load-fen-input').value.trim();
            if(inputFen === '') return;
            
            // Intentar cargar la FEN en el cerebro (chess.js)
            let valid = game.load(inputFen);
            if (valid) {
                board.position(game.fen());
                actualizarEstado();
                document.getElementById('load-fen-input').value = ""; // Limpiar caja
            } else {
                alert("Código FEN inválido. Comprueba que lo has copiado correctamente.");
            }
        }

        // Inicialización
        let config = {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };

        board = Chessboard('tablero', config);
        actualizarEstado();

    </script>
</body>
</html>
