<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Memoria Chess Pro - Modo Duelo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        
        #stats-top {
            display: flex; gap: 20px; background: var(--panel-bg); padding: 10px 30px;
            border-radius: 50px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #444;
        }
        .stat-item { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .stat-val { color: var(--accent); font-size: 1.2em; }

        #game-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 1000px; }

        #boards-container { display: flex; flex-direction: row; gap: 20px; justify-content: center; width: 100%; }

        .board-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .board-label { font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 0.9em; }

        .chess-board { width: 400px; height: 400px; border: 5px solid #3d3a37; border-radius: 4px; position: relative; }
        
        #cortina { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(38, 36, 33, 0.98); display: flex; justify-content: center; align-items: center; z-index: 20; }
        .placeholder-board { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1917; color: #555; border: 4px dashed #333; box-sizing: border-box; }

        #control-panel { width: 100%; max-width: 820px; background: var(--panel-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 15px; }

        #barra-tiempo-container { width: 100%; height: 8px; background: #1a1917; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        #barra-tiempo { height: 100%; width: 100%; background: var(--success); transition: width linear; }

        .input-row { display: flex; gap: 15px; }
        textarea { flex: 1; height: 100px; background: #262421; color: #fff; border: 2px solid #444; padding: 12px; border-radius: 4px; resize: none; font-size: 1.1em; outline: none; }
        textarea:focus { border-color: var(--blue); }
        
        #preview-box { background: #1a1917; padding: 10px; border-radius: 4px; min-height: 50px; border-left: 4px solid var(--blue); display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; }

        .preview-tag { padding: 3px 7px; border-radius: 3px; font-family: monospace; font-weight: bold; font-size: 1em; }
        .tag-white { background: #e2e2e2; color: #111; }
        .tag-black { background: #222; color: #eee; border: 1px solid #555; }

        button { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-amarillo { background: var(--accent); color: #262421; padding: 15px 30px; font-size: 1.1em; }
        .btn-azul { background: var(--blue); color: white; padding: 15px 30px; }
        .btn-verde { background: var(--success); color: white; padding: 15px 30px; width: 100%; margin-top: 10px; font-size: 1.2em;}
        .btn-color { padding: 5px 12px; font-size: 0.9em; margin-bottom: 5px; border: 1px solid #444; }
        
        #pantalla-carga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        
        #feedback-result { font-weight: bold; text-align: center; font-size: 1.3em; margin-top: 10px; }

        @media (max-width: 850px) {
            #boards-container { flex-direction: column; align-items: center; }
            .chess-board { width: 350px; height: 350px; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="pantalla-carga">
        <h1 id="titulo-carga" style="color: var(--accent);">🧠 Memoria Chess Pro</h1>
        <button id="btn-defecto" class="btn-secundario" style="padding: 15px 30px; font-size: 1.2em;">🎮 Usar base del juego</button>
        <p style="font-size: 0.9em; margin-top: 20px; color: #888;">O sube tu propio archivo:</p>
        <input type="file" id="archivoInput" accept=".json" style="max-width: 300px;">
        
        <a id="btn-volver" href="index.html" style="text-decoration:none; margin-top: 40px;">
            <button style="background:#444; color:white; padding:15px 30px; font-size:1.1em; box-shadow: 0 4px 0 #222;">⬅ Volver al Menú Principal</button>
        </a>
    </div>

    <div id="game-layout" class="oculto">
        <div id="stats-top">
            <div class="stat-item">VISTOS: <span id="puzzles-vistos" class="stat-val">0</span></div>
            <div class="stat-item">ACIERTOS: <span id="aciertos-num" class="stat-val">0</span></div>
            <div class="stat-item">TIEMPO: <span id="segundos-num" class="stat-val">5s</span></div>
        </div>

        <div id="boards-container">
            <div class="board-box">
                <div class="board-label" id="label-izq">Posición Real</div>
                <div id="tablero-container" class="chess-board">
                    <div id="tablero" style="width:100%; height:100%;"></div>
                    <div id="tablero-oculto-msg" class="placeholder-board oculto">
                        <span style="font-size: 4em;">❓</span>
                        <p>TABLERO OCULTO</p>
                    </div>
                    <div id="cortina">
                        <button id="btn-comenzar" class="btn-amarillo" onclick="comenzarMemorizacion()">MEMORIZAR (5s)</button>
                    </div>
                </div>
            </div>

            <div id="user-board-box" class="board-box oculto">
                <div class="board-label">Tu Reconstrucción</div>
                <div id="tablero-user-container" class="chess-board">
                    <div id="tablero-user" style="width:100%; height:100%;"></div>
                </div>
            </div>
        </div>

        <div id="control-panel" class="oculto">
            <div id="barra-tiempo-container"><div id="barra-tiempo"></div></div>
            
            <div class="input-row">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: bold; color: var(--accent);">Escribe la posición:</span>
                        <div>
                            <button class="btn-color" style="background:#e2e2e2; color:#000" onclick="insertarTexto('Blancas: ')">B</button>
                            <button class="btn-color" style="background:#222; color:#fff" onclick="insertarTexto('Negras: ')">N</button>
                        </div>
                    </div>
                    <textarea id="textoUsuario" placeholder="Rg1, f2, f3... Negras: a6, c7..." oninput="actualizarPreview()"></textarea>
                </div>

                <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                    <span style="font-weight: bold; color: #888; font-size: 0.8em;">LECTURA DEL SISTEMA:</span>
                    <div id="preview-box">Esperando entrada...</div>
                    <button id="btn-comprobar" class="btn-azul" onclick="comprobarAutomatico()">✅ COMPROBAR RESPUESTA</button>
                </div>
            </div>

            <div id="feedback-result"></div>
            <button id="btn-siguiente" class="btn-verde oculto" onclick="siguienteRonda()">SIGUIENTE PUZZLE ➡</button>
            <a id="btn-volver-layout" href="index.html" style="text-decoration:none; width:100%;">
                <button style="background:#444; color:white; width:100%; margin-top:10px; padding:15px; box-shadow: 0 4px 0 #222;">⬅ Menú Principal</button>
            </a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="utils.js"></script>

    <script>
        let todosLosPuzzles = {}, puzzleActual = null, game = new Chess(), board = null, userBoard = null;
        let tiempoObservacion = 5000, temporizador = null, intervaloNum = null;
        let contadorPuzzles = 0, contadorAciertos = 0;

        const piezasES = {
            'rey': 'k', 'r': 'k', 'dama': 'q', 'd': 'q',
            'torre': 'r', 't': 'r', 'alfil': 'b', 'a': 'b',
            'caballo': 'n', 'c': 'n', 'peon': 'p', 'p': 'p'
        };

        window.onload = () => {
            let p = obtenerPerfil();
            contadorPuzzles = p.memoriaJugados || 0;
            contadorAciertos = p.memoriaAciertos || 0;
            document.getElementById('puzzles-vistos').innerText = contadorPuzzles;
            document.getElementById('aciertos-num').innerText = contadorAciertos;

            // AUTO-ARRANQUE EN MODO DUELO
            const params = new URLSearchParams(window.location.search);
            if (params.get('duelo') === 'true') {
                document.getElementById('btn-volver').style.display = 'none';
                document.getElementById('btn-volver-layout').style.display = 'none';
                document.getElementById('titulo-carga').innerText = "⚔️ MODO DUELO SINCRONIZADO";
                
                // Iniciamos automáticamente después de cargar base
                setTimeout(() => {
                    let btnComenzar = document.getElementById('btn-comenzar');
                    if(btnComenzar) btnComenzar.click();
                }, 1500);
            }
        };

        inicializarCargaBaseDatos('mis_puzzles.json', 'btn-defecto', 'archivoInput', function(data) {
            todosLosPuzzles = data; iniciarPantallaJuego(); 
        });

        function iniciarPantallaJuego() {
            document.getElementById('pantalla-carga').classList.add('oculto');
            document.getElementById('game-layout').classList.remove('oculto');
            
            const config = { pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png', position: 'clear' };
            board = Chessboard('tablero', config);
            userBoard = Chessboard('tablero-user', config);
        }

        function insertarTexto(t) {
            const area = document.getElementById('textoUsuario');
            if (area.value.length > 0 && !area.value.endsWith('\n')) area.value += '\n';
            area.value += t; area.focus(); actualizarPreview();
        }

        function comenzarMemorizacion() {
            document.getElementById('cortina').classList.add('oculto'); 
            document.getElementById('control-panel').classList.remove('oculto');
            document.getElementById('tablero-oculto-msg').classList.add('oculto');
            document.getElementById('tablero').classList.remove('oculto');
            document.getElementById('user-board-box').classList.add('oculto');
            document.getElementById('btn-comprobar').classList.remove('oculto');
            document.getElementById('btn-siguiente').classList.add('oculto');
            document.getElementById('textoUsuario').value = "";
            document.getElementById('textoUsuario').disabled = false;
            document.getElementById('feedback-result').innerText = "";
            document.getElementById('label-izq').innerText = "Memoriza la Posición";

            cargarPuzzleSincronizado();
            
            let barra = document.getElementById('barra-tiempo');
            barra.style.transition = 'none'; barra.style.width = '100%';
            setTimeout(() => { barra.style.transition = `width ${tiempoObservacion}ms linear`; barra.style.width = '0%'; }, 50);

            let t = tiempoObservacion / 1000;
            document.getElementById('segundos-num').innerText = t + "s";
            
            reproducirSonido('tick');
            
            if (intervaloNum) clearInterval(intervaloNum);
            intervaloNum = setInterval(() => {
                t--; document.getElementById('segundos-num').innerText = (t < 0 ? 0 : t) + "s";
                if (t > 0) reproducirSonido('tick');
                if (t <= 0) clearInterval(intervaloNum);
            }, 1000);

            temporizador = setTimeout(() => { faseReconstruccion(); }, tiempoObservacion);
        }

        function cargarPuzzleSincronizado() {
            let lista = Object.values(todosLosPuzzles).flat();
            
            // SINCRONIZACIÓN MAESTRA
            let indiceElegido = (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) 
                                ? DueloManager.obtenerIndiceSincronizado(lista.length) 
                                : Math.floor(Math.random() * lista.length);

            puzzleActual = lista[indiceElegido];
            game.load(puzzleActual.fen); board.position(game.fen());
        }

        function faseReconstruccion() {
            document.getElementById('tablero').classList.add('oculto');
            document.getElementById('tablero-oculto-msg').classList.remove('oculto');
            document.getElementById('label-izq').innerText = "Tablero Oculto";
            document.getElementById('textoUsuario').focus();
        }

        function parsearEntrada() {
            const texto = document.getElementById('textoUsuario').value.toLowerCase();
            const regex = /blancas|negras|([a-zñ]+)?\s?([a-h][1-8])/g;
            let matches = []; let colorActual = 'w'; let match;
            while ((match = regex.exec(texto)) !== null) {
                if (match[0].includes('blancas')) colorActual = 'w';
                else if (match[0].includes('negras')) colorActual = 'b';
                else if (match[2]) {
                    let piezaLetra = piezasES[match[1] ? match[1] : 'p'] || 'p';
                    matches.push({ pieza: piezaLetra, casilla: match[2], color: colorActual });
                }
            } return matches;
        }

        function actualizarPreview() {
            const piezasDetectadas = parsearEntrada(); const box = document.getElementById('preview-box');
            if (piezasDetectadas.length === 0) { box.innerHTML = "Esperando entrada..."; return; }
            box.innerHTML = piezasDetectadas.map(p => `<span class="preview-tag ${p.color === 'w' ? 'tag-white' : 'tag-black'}">${p.pieza.toUpperCase()}${p.casilla}</span>`).join('');
        }

        function comprobarAutomatico() {
            const piezasDetectadas = parsearEntrada();
            const realPiecesFen = puzzleActual.fen.split(' ')[0];
            
            let tempGame = new Chess(); tempGame.clear();
            piezasDetectadas.forEach(p => { tempGame.put({ type: p.pieza, color: p.color }, p.casilla); });
            const userPiecesFen = tempGame.fen().split(' ')[0];
            
            document.getElementById('user-board-box').classList.remove('oculto');
            
            contadorPuzzles++;
            if (!(typeof DueloManager !== 'undefined' && DueloManager.enDuelo)) {
                actualizarEstadisticaGlobal('memoriaJugados', 1, true);
            }
            document.getElementById('puzzles-vistos').innerText = contadorPuzzles;

            setTimeout(() => {
                userBoard.resize(); userBoard.position(userPiecesFen);
                document.getElementById('tablero-oculto-msg').classList.add('oculto');
                document.getElementById('tablero').classList.remove('oculto');
                document.getElementById('label-izq').innerText = "Posición Correcta";
                board.position(realPiecesFen);
            }, 50);

            const feedback = document.getElementById('feedback-result');
            if (userPiecesFen === realPiecesFen) {
                reproducirSonido('correcto');
                feedback.innerText = "¡EXCELENTE! POSICIÓN EXACTA."; feedback.style.color = "var(--success)";
                
                contadorAciertos++;
                if (!(typeof DueloManager !== 'undefined' && DueloManager.enDuelo)) {
                    actualizarEstadisticaGlobal('memoriaAciertos', 1, true);
                    registrarXP('avanzado', true);
                }

                // ENVÍO DE PUNTOS AL MARCADOR DE DUELO
                if (typeof DueloManager !== 'undefined') DueloManager.enviarPuntos(contadorAciertos);
                
                document.getElementById('aciertos-num').innerText = contadorAciertos;
            } else {
                reproducirSonido('incorrecto');
                if (!(typeof DueloManager !== 'undefined' && DueloManager.enDuelo)) {
                    registrarXP('avanzado', false);
                }
                feedback.innerText = "HAY DIFERENCIAS ENTRE LOS TABLEROS."; feedback.style.color = "var(--danger)";
            }

            document.getElementById('btn-comprobar').classList.add('oculto');
            document.getElementById('btn-siguiente').classList.remove('oculto');
            document.getElementById('textoUsuario').disabled = true;
        }

        function siguienteRonda() {
            document.getElementById('cortina').classList.remove('oculto');
            document.getElementById('control-panel').classList.add('oculto');
            document.getElementById('user-board-box').classList.add('oculto');
            document.getElementById('segundos-num').innerText = "5s";
            board.clear(); userBoard.clear();
            
            // Si es un duelo, lanzamos la siguiente ronda automáticamente al resetear
            if (typeof DueloManager !== 'undefined' && DueloManager.enDuelo) {
                setTimeout(comenzarMemorizacion, 500);
            }
        }
    </script>
</body>
</html>
