<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Puzzle Storm - Modo Racha</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box;}
        h1 { color: var(--accent); margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        #main-layout { display: flex; flex-direction: row; gap: 40px; width: 100%; max-width: 900px; justify-content: center; align-items: flex-start; }
        @media (max-width: 800px) { #main-layout { flex-direction: column; align-items: center; } #sidebar { width: 100%; max-width: 420px; } }

        #tablero-wrapper { flex: 0 0 420px; display: flex; flex-direction: column; align-items: center; }
        #tablero { width: 420px; border: 6px solid #3d3a37; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #status-box { width: 100%; margin-top: 15px; background: var(--panel-bg); padding: 15px; border-radius: 8px; text-align: center; box-sizing: border-box; border: 1px solid #444; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        #status { font-weight: bold; font-size: 1.2em; transition: 0.2s; }

        #sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; width: 350px; }
        .panel-box { background: var(--panel-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #444; }
        .panel-title { font-weight: bold; color: var(--accent); margin-bottom: 15px; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px;}

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: #262421; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #3d3a37; }
        .stat-value { display: block; font-size: 2em; color: var(--text); font-weight: bold; transition: color 0.3s, transform 0.3s; }
        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; margin-top: 5px; display: block;}

        .val-rating { color: var(--blue); }
        .val-racha { color: var(--accent); }
        
        .btn-skip { background: var(--danger); box-shadow: 0 4px 0 #8a1f1f; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; color: white; padding: 15px 20px; font-size: 1.1em; }
        .btn-skip:hover { background: #e63939; box-shadow: 0 6px 0 #8a1f1f; transform: translateY(-2px); }
        .btn-skip:active { box-shadow: 0 2px 0 #8a1f1f; transform: translateY(2px); }
        
        @keyframes subida { 0% { transform: scale(1); } 50% { transform: scale(1.2); color: #fff; } 100% { transform: scale(1); } }
        .puntos-grandes { animation: subida 0.4s ease-out; color: var(--accent); }
    </style>
</head>
<body>

    <h1>⚡ Mi Puzzle Storm (Racha Progresiva) ⚡</h1>

    <div id="pantalla-carga">
        <h2 style="color: var(--text); margin-top: 0;">Configuración</h2>
        <p style="color: #aaa;">¿Qué base de datos quieres usar?</p>
        <button id="btn-defecto" class="btn-secundario">🎮 Usar la base del juego</button>
        <hr style="border: 1px solid #444; margin: 25px 0;">
        <p style="font-size: 0.9em; color: #888; text-align: left; margin-bottom: 5px;">O sube tu propio archivo <strong>.json</strong>:</p>
        <input type="file" id="archivoInput" accept=".json">    
    </div>

    <div id="pantalla-juego" class="oculto">
        <div id="main-layout">
            <div id="tablero-wrapper">
                <div id="tablero"></div>
                <div id="status-box"><div id="status">Cargando...</div></div>
            </div>

            <div id="sidebar">
                <div class="panel-box">
                    <div class="panel-title">Tus Estadísticas</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span id="ratingDisplay" class="stat-value val-rating">1700</span>
                            <span class="stat-label">Rating Actual</span>
                        </div>
                        <div class="stat-card">
                            <span id="rachaDisplay" class="stat-value val-racha">0</span>
                            <span class="stat-label">Racha x</span>
                        </div>
                    </div>
                </div>

                <div class="panel-box" style="padding: 15px;">
                    <a href="index.html" style="text-decoration:none;"><button class="btn-skip" style="background:#444; box-shadow: 0 4px 0 #222; margin-bottom:10px;">⬅ Menú Principal</button></a>
                    <button class="btn-skip" onclick="saltarPuzzle()">⏭️ Saltar Puzzle (-5 pts)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="utils.js"></script>

    <script>
        let todosLosPuzzles = {}; let eloActual = 1700; let puzzleActual = null; let game = new Chess(); let board = null; let racha = 0; let indiceMovimiento = 0; 

        inicializarCargaBaseDatos('mis_puzzles.json', 'btn-defecto', 'archivoInput', function(data) {
            todosLosPuzzles = data; iniciarPantallaJuego();
        });

        function iniciarPantallaJuego() {
            document.getElementById('pantalla-carga').classList.add('oculto');
            document.getElementById('pantalla-juego').classList.remove('oculto');
            iniciarJuego(); 
        }

        function iniciarJuego() {
            board = Chessboard('tablero', { draggable: true, position: 'start', pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd });
            let perfilActual = obtenerPerfil();
            eloActual = perfilActual.eloNormal || 1700; // ELO Normal
            cargarNuevoPuzzle();
        }

        function cargarNuevoPuzzle() {
            document.getElementById('status').innerText = "Pensando..."; document.getElementById('status').className = "";
            let rango = (Math.floor(eloActual / 50) * 50).toString();
            if (eloActual > 2500) rango = "2500"; if (!todosLosPuzzles[rango]) rango = "1700"; 
            let lista = todosLosPuzzles[rango];
            puzzleActual = lista[Math.floor(Math.random() * lista.length)];
            if (typeof puzzleActual.moves === 'string') puzzleActual.moves = puzzleActual.moves.split(' ');
            indiceMovimiento = 0; game.load(puzzleActual.fen);
            hacerMovimiento(puzzleActual.moves[indiceMovimiento]); indiceMovimiento++; 
            let colorJugador = game.turn() === 'w' ? 'white' : 'black';
            board.orientation(colorJugador); board.position(game.fen());
            document.getElementById('status').innerHTML = `Juegan <strong style="color:var(--accent);">${colorJugador === 'white' ? 'BLANCAS' : 'NEGRAS'}</strong> | Nivel: ${puzzleActual.rating}`;
            let rDisplay = document.getElementById('ratingDisplay'); rDisplay.innerText = eloActual; rDisplay.classList.remove('puntos-grandes');
        }

        function hacerMovimiento(moveString) { let from = moveString.substring(0,2); let to = moveString.substring(2,4); let promotion = moveString.length > 4 ? moveString.substring(4,5) : 'q'; game.move({ from: from, to: to, promotion: promotion }); }

        function onDragStart (source, piece) { if (game.game_over()) return false; if ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false; }

        function onDrop (source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' }); if (move === null) return 'snapback';
            let miMovimiento = source + target; if (move.promotion) miMovimiento += move.promotion; let solucionCorrecta = puzzleActual.moves[indiceMovimiento];

            if (miMovimiento === solucionCorrecta) {
                if (indiceMovimiento < puzzleActual.moves.length - 1) reproducirSonido('correcto');
                indiceMovimiento++; 
                if (indiceMovimiento < puzzleActual.moves.length) {
                    document.getElementById('status').innerText = "¡Buena jugada! Remata el puzzle..."; document.getElementById('status').className = "correcto";
                    setTimeout(() => { hacerMovimiento(puzzleActual.moves[indiceMovimiento]); board.position(game.fen()); indiceMovimiento++; if (indiceMovimiento >= puzzleActual.moves.length) puzzleFinalizado(); }, 250); 
                } else { puzzleFinalizado(); }
            } else {
                reproducirSonido('incorrecto'); game.undo(); 
                document.getElementById('status').innerText = "❌ Incorrecto. Vuelve a intentarlo."; document.getElementById('status').className = "incorrecto";
                eloActual -= 10; racha = 0; document.getElementById('rachaDisplay').innerText = racha; document.getElementById('ratingDisplay').innerText = eloActual;
                
                actualizarEstadisticaGlobal('eloNormal', eloActual, false);
                registrarXP('avanzado', false); // XP POR FALLO
                return 'snapback'; 
            }
        }

        function puzzleFinalizado() {
            reproducirSonido('fin');
            let puntosBase = 15; let bonusRacha = racha * 5; let totalPuntos = puntosBase + bonusRacha;
            if ((racha + 1) % 5 === 0) totalPuntos += 10;
            racha++; eloActual += totalPuntos; document.getElementById('rachaDisplay').innerText = racha;
            
            actualizarEstadisticaGlobal('eloNormal', eloActual, false);
            registrarXP('avanzado', true); // XP POR ACIERTO
            
            let ratingDOM = document.getElementById('ratingDisplay'); ratingDOM.innerText = eloActual; ratingDOM.classList.add('puntos-grandes');
            let mensaje = `✅ ¡CORRECTO! +${totalPuntos}`; if (racha > 1) mensaje += ` (Racha x${racha})`;
            let statusDOM = document.getElementById('status'); statusDOM.innerText = mensaje; statusDOM.className = "correcto puntos-grandes";
            setTimeout(() => { statusDOM.classList.remove('puntos-grandes'); cargarNuevoPuzzle(); }, 800);
        }

        function saltarPuzzle() {
            reproducirSonido('incorrecto');
            eloActual -= 5; racha = 0; document.getElementById('rachaDisplay').innerText = racha;
            actualizarEstadisticaGlobal('eloNormal', eloActual, false);
            registrarXP('avanzado', false); // XP POR SALTAR
            cargarNuevoPuzzle();
        }

        function onSnapEnd () { board.position(game.fen()); }
    </script>
</body>
</html>
