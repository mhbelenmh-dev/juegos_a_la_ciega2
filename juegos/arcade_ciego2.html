<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ARCADE BLIND MASTER - VOZ (Torneo)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♞</text></svg>">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="styles.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@400;700&display=swap');

        body { font-family: 'Roboto', sans-serif; background-color: #111; color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        #hud { width: 100%; padding: 20px; background: #000; display: flex; justify-content: space-around; border-bottom: 3px solid #333; z-index: 10;}
        .hud-value { font-family: 'Black Ops One', cursive; font-size: 2.5em; color: var(--accent); }

        #main-layout { display: flex; flex-direction: row; width: 100%; height: 100%; max-width: 1200px; justify-content: center; }
        
        #panel-leaderboard { flex: 0 0 300px; background: #1a1a1a; border-right: 3px solid #333; padding: 20px; overflow-y: auto; display: none; }
        .leaderboard-title { color: var(--accent); font-family: 'Black Ops One'; font-size: 1.5em; text-align: center; margin-bottom: 20px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #333; font-size: 1.1em; background: #222; margin-bottom: 5px; border-radius: 5px;}
        .leaderboard-item.me { border: 1px solid var(--accent); background: #2a2820; }
        .rank-pts { font-weight: bold; color: var(--blue); }

        #game-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        .target { font-size: 6em; font-weight: bold; margin: 10px 0; color: #fff; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }

        .big-btn { background: var(--accent); color: #000; font-family: 'Black Ops One', cursive; font-size: 1.5em; padding: 20px 40px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; box-shadow: 0 5px 0 #b39500; text-transform: uppercase;}
        .big-btn:active { transform: translateY(5px); box-shadow: none; }
        .skip-btn { background: #444; color: #fff; font-size: 1.2em; padding: 10px 30px; border: 1px solid #666; cursor: pointer; border-radius: 5px; margin-top: 20px; }

        #last-heard { color: #666; font-style: italic; margin-top: 10px; font-size: 1.2em; min-height: 1.5em; }
        .danger { color: var(--danger) !important; }

        /* --- ESTILOS TORNEO --- */
        #lobby-torneo { background: #1a1a1a; padding: 40px; border-radius: 12px; border: 2px solid var(--accent); max-width: 600px; width: 100%; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 50;}
        #codigo-input { background: #000; color: var(--accent); border: 2px dashed #555; font-size: 3em; font-family: 'Courier New', Courier, monospace; text-align: center; width: 200px; padding: 10px; border-radius: 8px; outline: none; margin: 10px 0 20px 0; font-weight: bold;}
        .jugador-lobby { display: inline-block; background: #262421; border: 1px solid #444; padding: 8px 15px; margin: 5px; border-radius: 20px; font-weight: bold; color: #fff; }
        
        #pantalla-podio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.98); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .podio-titulo { font-family: 'Black Ops One'; font-size: 4em; color: var(--accent); text-transform: uppercase; margin-bottom: 40px; text-shadow: 0 0 20px rgba(229, 191, 0, 0.5); text-align: center;}
        .podio-fila { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; background: #222; padding: 20px; margin-bottom: 10px; border-radius: 8px; font-size: 1.5em; border: 1px solid #444; }
        .podio-oro { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); font-size: 1.8em; font-weight: bold;}
        .podio-plata { border-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .podio-bronce { border-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-box"><div id="score-val" class="hud-value">0</div><div style="text-align: center; color: #888;">Puntos</div></div>
        <div class="hud-box" id="timer-box"><div id="timer-val" class="hud-value">120</div><div style="text-align: center; color: #888;">Tiempo</div></div>
    </div>

    <div id="lobby-torneo" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h2 style="color: var(--accent); font-size: 2.5em; margin-top: 0; font-family: 'Black Ops One';">SALA DE TORNEO</h2>
        <p style="color: #aaa; font-size: 1.1em;">Comparte este código o escribe uno para unirte:</p>
        <input type="text" id="codigo-input" maxlength="4" oninput="cambiarSalaTorneo(this.value)">
        <div style="background: #000; border: 1px solid #333; border-radius: 8px; padding: 20px; min-height: 150px; text-align: left;">
            <div style="color: #888; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">JUGADORES EN SALA:</div>
            <div id="lista-lobby">Cargando...</div>
        </div>
        <button class="big-btn" style="background: var(--success); color: white; width: 100%; box-shadow: 0 5px 0 #4a751b;" onclick="empezarTorneoParaTodos()">🔥 ¡EMPEZAR AHORA! 🔥</button>
        <button class="skip-btn" style="width:100%;" onclick="location.reload()">⬅ Salir del Lobby</button>
    </div>

    <div id="main-layout">
        <div id="panel-leaderboard">
            <div class="leaderboard-title">🏆 RANKING</div>
            <div id="leaderboard-list"></div>
        </div>

        <div id="game-area">
            <div id="start-screen" class="screen active">
                <h1 id="main-title">ARCADE VOZ</h1>
                <p id="sub-title" style="font-size: 1.2em; color: #aaa;">Supervivencia sin manos</p>
                <div id="hs-box" style="margin-bottom: 20px; font-size: 1.2em;">Récord Arcade: <strong id="high-score" style="color:var(--accent)">0</strong></div>
                
                <button class="big-btn" style="background: var(--blue); color: white; box-shadow: 0 5px 0 #20629c;" onclick="Game.start(false)">🎮 JUGAR SOLO</button>
                <button class="big-btn" onclick="abrirLobbyTorneo()">🏆 MODO TORNEO</button>
                
                <a href="index.html" style="text-decoration:none;"><button class="skip-btn" style="margin-top:30px;">⬅ Volver al Menú</button></a>
            </div>

            <div id="play-screen" class="screen">
                <div id="q-type" style="color:var(--blue); font-weight: bold; letter-spacing: 2px; font-size: 1.5em;">--</div>
                <div id="q-content" class="target">--</div>
                <div id="mic-status" style="color:var(--success); font-weight:bold; font-size: 1.5em;">🎤 Escuchando...</div>
                <div id="last-heard">Oigo: ...</div>
                <button class="skip-btn" onclick="Game.skip()">⏭️ SALTAR (-5s)</button>
            </div>
        </div>
    </div>

    <div id="pantalla-podio" style="display: none;">
        <div class="podio-titulo">🏁 TORNEO FINALIZADO 🏁</div>
        <div id="lista-podio" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <div style="display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; width: 100%;">
            <button class="big-btn" style="background: var(--success); color: white; box-shadow: 0 5px 0 #4a751b;" onclick="jugarRevancha()">🔄 Jugar Revancha</button>
            <button class="big-btn" style="background: #444; color: white; box-shadow: 0 5px 0 #222;" onclick="location.reload()">⬅ Salir</button>
        </div>
    </div>

    <script src="utils.js"></script>

    <script>
        function compararSimilitud(s1, s2) {
            let m = s1.length, n = s2.length; let d = Array.from(Array(m + 1), () => new Array(n + 1));
            for (let i = 0; i <= m; i++) d[i][0] = i; for (let j = 0; j <= n; j++) d[0][j] = j;
            for (let j = 1; j <= n; j++) { for (let i = 1; i <= m; i++) { let cost = (s1[i - 1] === s2[j - 1]) ? 0 : 1; d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + cost); } }
            return 1 - (d[m][n] / Math.max(m, n));
        }

        const Voice = {
            synth: window.speechSynthesis, recog: null,
            validas: ["anna", "bela", "cesar", "david", "eva", "felix", "gustavo", "hector", "blanca", "negra", "uno", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "repite", "repitelo", "jugar", "empezar"],
            init() {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SpeechRec) { alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome."); return; }
                this.recog = new SpeechRec(); this.recog.lang = 'es-ES'; this.recog.continuous = true; this.recog.interimResults = true;
                this.recog.onresult = (e) => { let fullText = ''; for (let i = e.resultIndex; i < e.results.length; ++i) { fullText += e.results[i][0].transcript; } Game.processVoice(fullText.toLowerCase().trim()); };
                this.recog.onend = () => { if (Game.isPlaying) this.recog.start(); };
            },
            say(text) {
                this.synth.cancel(); let clean = text.toLowerCase();
                const nombres = { 'a': 'Anna', 'b': 'Bela', 'c': 'César', 'd': 'David', 'e': 'Eva', 'f': 'Félix', 'g': 'Gustavo', 'h': 'Héctor' };
                clean = clean.replace(/([a-h])([1-8])/g, (m, l, n) => nombres[l] + " " + n + " ");
                const u = new SpeechSynthesisUtterance(clean); u.lang = 'es-ES'; u.rate = 1.0; this.synth.speak(u);
            }
        };

        // ---------------- TORNEO LOBBY ----------------
        let refSalaTorneo = null; let intervaloTorneo = null;
        
        function abrirLobbyTorneo() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('lobby-torneo').style.display = 'block';
            let codigoRandom = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('codigo-input').value = codigoRandom;
            cambiarSalaTorneo(codigoRandom);
        }

        function cambiarSalaTorneo(codigo) {
            codigo = codigo.trim(); if(codigo.length < 4) return;
            TorneoManager.enTorneo = true; TorneoManager.codigoSala = codigo;
            let uid = localStorage.getItem('current_user_uid') || "invitado_" + Math.floor(Math.random()*1000);
            let nombre = localStorage.getItem('current_user_name') || "Anónimo";

            if (refSalaTorneo) firebase.database().ref(refSalaTorneo).off(); 
            refSalaTorneo = `torneos/${codigo}`;
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}`).set({ nombre: nombre, puntos: 0 });
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}`).onDisconnect().remove();

            firebase.database().ref(refSalaTorneo).on('value', (snap) => {
                let data = snap.val(); if (!data) return;
                if (data.jugadores) {
                    let htmlLobby = ""; let listaLeaderboard = []; let miUid = localStorage.getItem('current_user_uid');
                    for (let key in data.jugadores) {
                        let j = data.jugadores[key]; htmlLobby += `<span class="jugador-lobby">${j.nombre}</span>`;
                        listaLeaderboard.push({ uid: key, nombre: j.nombre, puntos: j.puntos || 0 });
                    }
                    if (!Game.isPlaying) document.getElementById('lista-lobby').innerHTML = htmlLobby;
                    
                    listaLeaderboard.sort((a, b) => b.puntos - a.puntos);
                    let htmlBoard = "";
                    listaLeaderboard.forEach((j, index) => {
                        let medalla = index === 0 ? '👑' : index === 1 ? '🥈' : index === 2 ? '🥉' : '🔹';
                        let extraClass = (j.uid === miUid) ? "me" : "";
                        htmlBoard += `<div class="leaderboard-item ${extraClass}"><span>${medalla} ${j.nombre}</span> <span class="rank-pts">${j.puntos}</span></div>`;
                    });
                    document.getElementById('leaderboard-list').innerHTML = htmlBoard;
                }
                if (data.estado === 'jugando' && !Game.isPlaying) {
                    let restante = data.tiempoFin ? Math.floor((data.tiempoFin - Date.now()) / 1000) : 0;
                    if (restante > 0) {
                        TorneoManager.semillaRonda = data.tiempoFin.toString();
                        document.getElementById('pantalla-podio').style.display = 'none';
                        document.getElementById('lobby-torneo').style.display = 'none';
                        Game.start(true, data.tiempoFin);
                    } else {
                        document.getElementById('lista-lobby').innerHTML += "<div style='color:var(--accent); margin-top:15px;'>Esperando revancha...</div>";
                    }
                }
            });
        }

        function empezarTorneoParaTodos() {
            if (!TorneoManager.codigoSala) return;
            let tiempoFinal = Date.now() + 180000; // 3 Minutos
            firebase.database().ref(refSalaTorneo).update({ estado: 'jugando', tiempoFin: tiempoFinal });
        }

        // ---------------- JUEGO ARCADE VOZ ----------------
        const Game = {
            score: 0, time: 120, isPlaying: false, current: null,
            
            start(esTorneo, tiempoFinMs = null) {
                if(!Voice.recog) Voice.init(); 
                this.isPlaying = true; this.score = 0;
                document.getElementById('score-val').innerText = this.score;
                document.getElementById('start-screen').classList.remove('active');
                document.getElementById('play-screen').classList.add('active');
                
                try { Voice.recog.start(); } catch(e){}
                
                if (esTorneo) {
                    TorneoManager.contador = 0;
                    document.getElementById('panel-leaderboard').style.display = 'block';
                    
                    this.reloj = setInterval(() => {
                        let restante = Math.floor((tiempoFinMs - Date.now()) / 1000);
                        if (restante <= 0) { clearInterval(this.reloj); this.end(true); return; }
                        document.getElementById('timer-val').innerText = restante;
                        if(restante <= 10) document.getElementById('timer-val').classList.add('danger');
                        else document.getElementById('timer-val').classList.remove('danger');
                    }, 1000);
                } else {
                    this.time = 120;
                    this.reloj = setInterval(() => {
                        if (this.isPlaying) {
                            this.time--; let timerVal = document.getElementById('timer-val'); timerVal.innerText = this.time;
                            if (this.time <= 10 && this.time > 0) { reproducirSonido('tick'); timerVal.classList.add('danger'); } else { timerVal.classList.remove('danger'); }
                            if (this.time <= 0) this.end(false);
                        }
                    }, 1000);
                }
                this.next();
            },

            next() {
                if(!this.isPlaying) return;
                let r = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(100) / 100 : Math.random();
                if (r < 0.33) this.genColor(); else if (r < 0.66) this.genDiag(); else this.genKnight();
            },

            genColor() {
                let lIdx = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) : Math.floor(Math.random() * 8);
                let nVal = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) + 1 : Math.floor(Math.random() * 8) + 1;
                const l = "abcdefgh"[lIdx]; 
                this.current = { type: 'color', label: 'Color de casilla', target: l + nVal, ans: ((l.charCodeAt(0) - 96 + nVal) % 2 === 0) ? 'negra' : 'blanca' };
                this.render();
            },

            genDiag() {
                let lIdx = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) : Math.floor(Math.random() * 8);
                let nVal = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) + 1 : Math.floor(Math.random() * 8) + 1;
                const cas = "abcdefgh"[lIdx] + nVal;
                let f = cas.charCodeAt(0) - 96, r = parseInt(cas.charAt(1)); let sol = [];
                [[1, 1], [-1, 1], [1, -1], [-1, -1]].forEach(d => { let cf = f, cr = r; while (cf + d[0] >= 1 && cf + d[0] <= 8 && cr + d[1] >= 1 && cr + d[1] <= 8) { cf += d[0]; cr += d[1]; } if (cf !== f || cr !== r) sol.push(String.fromCharCode(96 + cf) + cr); });
                this.current = { type: 'diag', label: 'Diagonales', target: cas, ans: sol }; this.render();
            },

            genKnight() {
                let lIdx1 = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) : Math.floor(Math.random() * 8);
                let nVal1 = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) + 1 : Math.floor(Math.random() * 8) + 1;
                let lIdx2 = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) : Math.floor(Math.random() * 8);
                let nVal2 = (TorneoManager.enTorneo) ? TorneoManager.obtenerIndiceSincronizado(8) + 1 : Math.floor(Math.random() * 8) + 1;
                const s = "abcdefgh"[lIdx1] + nVal1;
                const e = "abcdefgh"[lIdx2] + nVal2;
                this.current = { type: 'knight', label: 'Circuito de caballo', target: s, end: e }; this.render();
            },

            render() {
                document.getElementById('q-type').innerText = this.current.label.toUpperCase();
                let txt = this.current.type === 'knight' ? this.current.target.toUpperCase() + " a " + this.current.end.toUpperCase() : this.current.target.toUpperCase();
                document.getElementById('q-content').innerText = txt; this.anunciar();
            },

            anunciar() { let msg = "Ejercicio de " + this.current.label + ". "; msg += (this.current.type === 'knight') ? (this.current.target + " a " + this.current.end) : this.current.target; Voice.say(msg); },

            skip() { 
                if(!this.isPlaying) return;
                reproducirSonido('incorrecto'); 
                if (TorneoManager.enTorneo) { this.score = Math.max(0, this.score - 50); TorneoManager.enviarPuntos(this.score); } 
                else { this.time -= 5; }
                Voice.say("Saltado"); 
                this.next(); 
            },

            processVoice(text) {
                let palabras = text.split(/\s+/);
                let filtradas = palabras.map(p => {
                    let mejor = { sim: 0, clave: "" }; Voice.validas.forEach(v => { let s = compararSimilitud(p, v); if (s > mejor.sim) { mejor.sim = s; mejor.clave = v; } });
                    return mejor.sim > 0.7 ? mejor.clave : "";
                }).filter(p => p !== "");

                if (!this.isPlaying && (filtradas.includes("jugar") || filtradas.includes("empezar"))) { this.start(false); return; }
                if (!this.isPlaying) return;

                document.getElementById('last-heard').innerText = "Oigo: " + filtradas.join(' ');

                if (filtradas.includes("repite") || filtradas.includes("repitelo")) {
                    Voice.recog.stop(); this.anunciar(); setTimeout(() => { if (this.isPlaying) Voice.recog.start(); }, 300); return;
                }

                let dec = filtradas.join(' '); const mapa = { "anna": "a", "bela": "b", "cesar": "c", "david": "d", "eva": "e", "felix": "f", "gustavo": "g", "hector": "h", "uno": "1", "dos": "2", "tres": "3", "cuatro": "4", "cinco": "5", "seis": "6", "siete": "7", "ocho": "8" };
                for (let [n, l] of Object.entries(mapa)) { dec = dec.replace(new RegExp("\\b" + n + "\\b", "g"), l); } dec = dec.replace(/\s+/g, '');

                if (this.current.type === 'color') {
                    if (dec.includes("blanca") || dec.includes("blanco")) this.check(this.current.ans === 'blanca'); else if (dec.includes("negra") || dec.includes("negro")) this.check(this.current.ans === 'negra');
                } else {
                    let coords = dec.match(/[a-h][1-8]/g) || []; let uniq = [...new Set(coords)];
                    if (this.current.type === 'diag') {
                        if (this.current.ans.length === 1) { if (uniq.includes(this.current.ans[0])) this.check(true); } else { if (uniq.filter(c => this.current.ans.includes(c)).length === this.current.ans.length) this.check(true); }
                    } else if (this.current.type === 'knight') {
                        if (uniq.includes(this.current.end)) this.check(true);
                    }
                }
            },
            
            check(isCorrect) {
                if(!this.isPlaying) return;
                this.isPlaying = false; Voice.recog.stop();

                if (isCorrect) {
                    reproducirSonido('correcto'); this.score += 100; 
                    if (!TorneoManager.enTorneo) this.time += 15; 
                    Voice.say("Bien");
                } else {
                    reproducirSonido('incorrecto'); 
                    if (TorneoManager.enTorneo) { this.score = Math.max(0, this.score - 20); } 
                    else { this.time -= 3; }
                    Voice.say("Mal");
                }
                
                if (TorneoManager.enTorneo) TorneoManager.enviarPuntos(this.score);
                else { let dif = this.current.type === 'color' ? 'basico' : this.current.type === 'diag' ? 'medio' : 'avanzado'; registrarXP(dif, isCorrect); }

                document.getElementById('score-val').innerText = this.score;
                setTimeout(() => { if (TorneoManager.enTorneo || this.time > 0) { this.isPlaying = true; try{Voice.recog.start();}catch(e){} this.next(); } }, 150);
            },

            end(esTorneo) {
                reproducirSonido('fin'); this.isPlaying = false; Voice.say("Fin");
                try{ Voice.recog.stop(); }catch(e){}

                document.getElementById('play-screen').classList.remove('active');
                
                if (esTorneo) {
                    document.getElementById('pantalla-podio').style.display = 'flex';
                    firebase.database().ref(refSalaTorneo).update({ estado: 'finalizado' });
                    firebase.database().ref(refSalaTorneo + '/jugadores').once('value').then(snap => {
                        let data = snap.val(); if(!data) return;
                        let lista = []; for(let key in data) { lista.push({ nombre: data[key].nombre, puntos: data[key].puntos || 0 }); }
                        lista.sort((a, b) => b.puntos - a.puntos);
                        let htmlPodio = "";
                        lista.forEach((j, i) => {
                            let clase = i === 0 ? "podio-oro" : i === 1 ? "podio-plata" : i === 2 ? "podio-bronce" : "";
                            let icono = i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🏅";
                            htmlPodio += `<div class="podio-fila ${clase}"><span>${icono} ${j.nombre}</span> <strong>${j.puntos} pts</strong></div>`;
                        });
                        document.getElementById('lista-podio').innerHTML = htmlPodio;
                    });
                } else {
                    document.getElementById('gameover-screen').classList.add('active'); 
                    document.getElementById('final-score').innerText = this.score;
                    actualizarEstadisticaGlobal('arcadeGlobalMax', this.score, false);
                }
            }
        };

        function jugarRevancha() {
            document.getElementById('pantalla-podio').style.display = 'none'; 
            document.getElementById('lobby-torneo').style.display = 'block';
            firebase.database().ref(refSalaTorneo).update({ estado: 'esperando', tiempoFin: null });
            let uid = localStorage.getItem('current_user_uid');
            firebase.database().ref(`${refSalaTorneo}/jugadores/${uid}/puntos`).set(0);
            Game.score = 0; Game.isPlaying = false;
        }

        window.onload = () => { 
            let p = obtenerPerfil(); document.getElementById('high-score').innerText = p.arcadeGlobalMax || 0; 
        };
    </script>
</body>
</html>
